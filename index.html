<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ril Video Call - Otomatis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .app-container {
            max-width: 900px;
            width: 100%;
            background: linear-gradient(160deg, #0f1a2b, #1a2a3f);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 18px;
        }

        .video-wrapper {
            position: relative;
            background: #0d1520;
            border-radius: 18px;
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 2px solid rgba(255, 255, 255, 0.04);
            transition: border-color 0.3s;
        }

        .video-wrapper.active-call {
            border-color: #00e676;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0e17;
            display: block;
        }

        .video-wrapper.local video {
            transform: scaleX(-1);
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.75);
            padding: 4px 14px;
            border-radius: 20px;
            color: #b0d4ff;
            font-size: 0.7rem;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .video-status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.6rem;
            color: #8ab3e6;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 14px;
        }

        .btn {
            padding: 12px 22px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.94);
        }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: #0077ff;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 119, 255, 0.25);
        }
        .btn-primary:hover:not(:disabled) {
            background: #0066dd;
        }

        .btn-success {
            background: #00b86b;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 184, 107, 0.25);
        }
        .btn-success:hover:not(:disabled) {
            background: #009a5a;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            box-shadow: 0 4px 20px rgba(220, 53, 69, 0.25);
        }
        .btn-danger:hover:not(:disabled) {
            background: #c82333;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #b0d4ff;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
        }

        .btn-warning {
            background: #ff9100;
            color: white;
            box-shadow: 0 4px 20px rgba(255, 145, 0, 0.25);
        }
        .btn-warning:hover:not(:disabled) {
            background: #e67a00;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            color: #8ab3e6;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .status-dot.idle {
            background: #5a6a7a;
        }
        .status-dot.connecting {
            background: #ffa726;
            animation: pulse 1s infinite;
        }
        .status-dot.connected {
            background: #00e676;
            animation: pulse 1.4s infinite;
        }
        .status-dot.error {
            background: #ef5350;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.5;
                transform: scale(0.9);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .timer {
            font-variant-numeric: tabular-nums;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 500;
            color: #d0e2ff;
        }

        .room-control {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .room-control input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 10px 18px;
            color: #d0e2ff;
            font-size: 0.9rem;
            flex: 1;
            min-width: 120px;
            outline: none;
            transition: border-color 0.2s;
        }

        .room-control input:focus {
            border-color: #0077ff;
        }
        .room-control input::placeholder {
            color: #3a5a7a;
        }

        .room-control .btn {
            min-width: 80px;
            padding: 10px 18px;
            font-size: 0.8rem;
        }

        .log-area {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            padding: 10px 14px;
            max-height: 70px;
            overflow-y: auto;
            font-size: 0.7rem;
            color: #5a7a9a;
            border: 1px solid rgba(255, 255, 255, 0.02);
            margin-top: 8px;
            line-height: 1.6;
        }

        .log-area::-webkit-scrollbar {
            width: 4px;
        }
        .log-area::-webkit-scrollbar-thumb {
            background: #2a3a4a;
            border-radius: 10px;
        }

        .log-entry {
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            padding: 2px 0;
        }
        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: #3a5a7a;
            margin-right: 8px;
        }

        .peer-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 6px;
        }

        .peer-badge {
            background: rgba(0, 119, 255, 0.15);
            border: 1px solid rgba(0, 119, 255, 0.2);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #8ab3e6;
        }

        @media (max-width: 640px) {
            .app-container {
                padding: 12px;
            }
            .video-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .video-wrapper {
                aspect-ratio: 4/3;
            }
            .btn {
                padding: 10px 14px;
                font-size: 0.75rem;
                min-width: 70px;
            }
            .controls {
                gap: 6px;
            }
            .status-bar {
                font-size: 0.7rem;
                padding: 8px 12px;
            }
            .room-control input {
                font-size: 0.8rem;
                padding: 8px 14px;
            }
        }

        @media (max-width: 400px) {
            .btn {
                padding: 8px 10px;
                font-size: 0.65rem;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <!-- Video -->
        <div class="video-grid">
            <div class="video-wrapper local" id="localWrapper">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="video-label">📷 Kamera Saya</div>
                <div class="video-status" id="localStatus">● Aktif</div>
            </div>
            <div class="video-wrapper remote" id="remoteWrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">👤 Partner</div>
                <div class="video-status" id="remoteStatus">○ Menunggu</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn btn-success" id="btnStart">📞 Mulai Panggilan</button>
            <button class="btn btn-danger" id="btnEnd" disabled>⏹ Akhiri</button>
            <button class="btn btn-secondary" id="btnCamera">📷 Kamera</button>
            <button class="btn btn-secondary" id="btnMic">🎤 Mikrofon</button>
            <button class="btn btn-warning" id="btnReset">↺ Reset</button>
        </div>

        <!-- Room & Peer -->
        <div class="room-control">
            <input type="text" id="roomInput" placeholder="📌 Nama Room (contoh: ruang1)" value="ruang1">
            <button class="btn btn-primary" id="btnJoinRoom">🔗 Gabung Room</button>
            <button class="btn btn-secondary" id="btnCreateRoom">📋 Buat Room</button>
        </div>

        <!-- Peer List -->
        <div class="peer-list" id="peerList"></div>

        <!-- Status -->
        <div class="status-bar">
            <div class="status-left">
                <span class="status-dot idle" id="statusDot"></span>
                <span id="statusText">Belum terhubung</span>
                <span id="roomDisplay" style="color:#3a5a7a;font-size:0.7rem;margin-left:8px;"></span>
            </div>
            <span class="timer" id="timerDisplay">⏱ 00:00</span>
        </div>

        <!-- Log -->
        <div class="log-area" id="logArea">
            <div class="log-entry"><span class="log-time">[System]</span> Aplikasi siap. Masukkan nama room dan klik "Gabung Room".</div>
        </div>
    </div>

    <script>
        // ================================================================
        //  RIL VIDEO CALL - Otomatis (Tanpa SDP Answer Manual)
        //  Menggunakan Signaling Server WebSocket bawaan
        //  Koneksi otomatis via room
        // ================================================================

        class RilVideoCall {
            constructor() {
                // State
                this.localStream = null;
                this.remoteStream = null;
                this.pc = null;
                this.isCallActive = false;
                this.isCameraOn = true;
                this.isMicOn = true;
                this.callStartTime = null;
                this.timerInterval = null;
                this.roomId = 'ruang1';
                this.myId = this.generateId();
                this.peerId = null;
                this.isOfferer = false;
                this.ws = null;
                this.isConnecting = false;
                this.reconnectAttempts = 0;

                // DOM
                this.localVideo = document.getElementById('localVideo');
                this.remoteVideo = document.getElementById('remoteVideo');
                this.localWrapper = document.getElementById('localWrapper');
                this.remoteWrapper = document.getElementById('remoteWrapper');
                this.localStatus = document.getElementById('localStatus');
                this.remoteStatus = document.getElementById('remoteStatus');
                this.statusDot = document.getElementById('statusDot');
                this.statusText = document.getElementById('statusText');
                this.timerDisplay = document.getElementById('timerDisplay');
                this.logArea = document.getElementById('logArea');
                this.peerList = document.getElementById('peerList');
                this.roomDisplay = document.getElementById('roomDisplay');

                // Inputs & Buttons
                this.roomInput = document.getElementById('roomInput');
                this.btnStart = document.getElementById('btnStart');
                this.btnEnd = document.getElementById('btnEnd');
                this.btnCamera = document.getElementById('btnCamera');
                this.btnMic = document.getElementById('btnMic');
                this.btnReset = document.getElementById('btnReset');
                this.btnJoinRoom = document.getElementById('btnJoinRoom');
                this.btnCreateRoom = document.getElementById('btnCreateRoom');

                // ICE Servers (STUN + TURN)
                this.iceServers = {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        {
                            urls: 'turn:openrelay.metered.ca:80',
                            username: 'openrelayproject',
                            credential: 'openrelayproject'
                        },
                        {
                            urls: 'turn:openrelay.metered.ca:443',
                            username: 'openrelayproject',
                            credential: 'openrelayproject'
                        },
                        {
                            urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                            username: 'openrelayproject',
                            credential: 'openrelayproject'
                        }
                    ],
                    iceCandidatePoolSize: 10
                };

                this.init();
            }

            generateId() {
                return 'user-' + Math.random().toString(36).substring(2, 8);
            }

            init() {
                this.setupEventListeners();
                this.updateButtons();
                this.log('📱 Ril Video Call siap!');
                this.log(`🆔 ID Anda: ${this.myId}`);
                this.log('📌 Masukkan nama room, klik "Gabung Room"');
                this.connectWebSocket();
            }

            setupEventListeners() {
                this.btnStart.addEventListener('click', () => this.startCall());
                this.btnEnd.addEventListener('click', () => this.endCall());
                this.btnCamera.addEventListener('click', () => this.toggleCamera());
                this.btnMic.addEventListener('click', () => this.toggleMic());
                this.btnReset.addEventListener('click', () => this.resetAll());
                this.btnJoinRoom.addEventListener('click', () => this.joinRoom());
                this.btnCreateRoom.addEventListener('click', () => this.createRoom());

                this.roomInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.joinRoom();
                });
            }

            // ---------- WEBSOCKET SIGNALING ----------
            connectWebSocket() {
                // Gunakan WebSocket public signaling server atau local
                // Untuk demo, kita gunakan server signaling gratis
                // Atau bisa juga menggunakan peer-to-peer dengan fallback
                try {
                    // Gunakan wss://echo.websocket.org sebagai relay sederhana
                    // Atau kita bisa menggunakan WebRTC dengan signaling manual
                    // Di sini kita gunakan pendekatan hybrid: WebSocket untuk signaling
                    this.ws = new WebSocket('wss://echo.websocket.org');

                    this.ws.onopen = () => {
                        this.log('✅ WebSocket terhubung ke signaling server');
                        this.reconnectAttempts = 0;
                        // Kirim join room jika sudah ada room
                        if (this.roomId) {
                            this.sendSignal('join', { roomId: this.roomId, userId: this.myId });
                        }
                    };

                    this.ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            this.handleSignal(data);
                        } catch (e) {
                            // Ignore non-JSON messages
                        }
                    };

                    this.ws.onerror = (error) => {
                        this.log(`⚠️ WebSocket error: ${error}`);
                    };

                    this.ws.onclose = () => {
                        this.log('🔴 WebSocket terputus, mencoba reconnect...');
                        setTimeout(() => {
                            this.reconnectAttempts++;
                            if (this.reconnectAttempts < 5) {
                                this.connectWebSocket();
                            } else {
                                this.log('❌ Gagal reconnect ke signaling server');
                            }
                        }, 3000);
                    };
                } catch (e) {
                    this.log(`⚠️ Gagal koneksi WebSocket: ${e.message}`);
                    this.log('📌 Gunakan mode manual (copy-paste SDP) jika perlu');
                }
            }

            sendSignal(type, data) {
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    const message = JSON.stringify({ type, ...data, from: this.myId });
                    this.ws.send(message);
                } else {
                    this.log('⚠️ WebSocket tidak tersedia, gunakan mode manual');
                }
            }

            handleSignal(data) {
                const { type, from, roomId, userId } = data;

                switch (type) {
                    case 'join':
                        this.log(`👤 User ${from} bergabung di room ${roomId}`);
                        this.updatePeerList();
                        break;

                    case 'offer':
                        if (from !== this.myId) {
                            this.log(`📤 Menerima offer dari ${from}`);
                            this.peerId = from;
                            this.handleOffer(data.sdp);
                        }
                        break;

                    case 'answer':
                        if (from !== this.myId) {
                            this.log(`📤 Menerima answer dari ${from}`);
                            this.peerId = from;
                            this.handleAnswer(data.sdp);
                        }
                        break;

                    case 'ice-candidate':
                        if (from !== this.myId && this.pc) {
                            this.log(`🧊 Menerima ICE dari ${from}`);
                            this.handleIceCandidate(data.candidate);
                        }
                        break;

                    case 'leave':
                        if (from !== this.myId) {
                            this.log(`👋 User ${from} meninggalkan room`);
                            if (this.isCallActive) {
                                this.endCall();
                            }
                            this.updatePeerList();
                        }
                        break;

                    case 'peer-list':
                        this.updatePeerList();
                        break;
                }
            }

            // ---------- ROOM MANAGEMENT ----------
            joinRoom() {
                this.roomId = this.roomInput.value.trim() || 'ruang1';
                this.roomDisplay.textContent = `📌 ${this.roomId}`;
                this.log(`🔗 Bergabung ke room: ${this.roomId}`);
                this.sendSignal('join', { roomId: this.roomId, userId: this.myId });
                this.updatePeerList();
            }

            createRoom() {
                this.roomId = this.roomInput.value.trim() || 'ruang1';
                this.roomDisplay.textContent = `📌 ${this.roomId} (creator)`;
                this.log(`📋 Membuat room: ${this.roomId}`);
                this.sendSignal('join', { roomId: this.roomId, userId: this.myId });
                this.updatePeerList();
                // Tampilkan instruksi
                this.log('📌 Beri tahu partner untuk join room yang sama');
            }

            updatePeerList() {
                // Simulasi peer list - dalam implementasi nyata, server akan mengirim daftar
                this.peerList.innerHTML = `
                    <span class="peer-badge">🟢 ${this.myId} (Anda)</span>
                    <span class="peer-badge" style="opacity:0.6;">👤 Partner akan terlihat di sini</span>
                `;
            }

            // ---------- MEDIA ----------
            async getMedia() {
                try {
                    this.log('📷 Mengakses kamera & mikrofon...');
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: 'user'
                        },
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    });
                    this.localStream = stream;
                    this.localVideo.srcObject = stream;
                    this.isCameraOn = true;
                    this.isMicOn = true;
                    this.localStatus.textContent = '● Aktif';
                    this.log('✅ Media berhasil diakses');
                    this.updateButtons();
                    return stream;
                } catch (err) {
                    this.log(`❌ Gagal akses media: ${err.message}`);
                    this.setStatus('❌ Media error', 'error');
                    throw err;
                }
            }

            stopMedia() {
                if (this.localStream) {
                    this.localStream.getTracks().forEach(t => t.stop());
                    this.localStream = null;
                    this.localVideo.srcObject = null;
                    this.localStatus.textContent = '○ Mati';
                }
                if (this.remoteStream) {
                    this.remoteStream.getTracks().forEach(t => t.stop());
                    this.remoteStream = null;
                    this.remoteVideo.srcObject = null;
                    this.remoteStatus.textContent = '○ Menunggu';
                }
            }

            // ---------- PEER CONNECTION ----------
            createPeerConnection() {
                if (this.pc) {
                    this.pc.close();
                    this.pc = null;
                }

                this.pc = new RTCPeerConnection(this.iceServers);
                this.log('🔗 PeerConnection dibuat');

                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => {
                        this.pc.addTrack(track, this.localStream);
                    });
                    this.log('📤 Track lokal ditambahkan');
                }

                this.pc.ontrack = (event) => {
                    this.log(`📡 Menerima track: ${event.track.kind}`);
                    if (event.streams && event.streams.length > 0) {
                        this.remoteStream = event.streams[0];
                        this.remoteVideo.srcObject = this.remoteStream;
                        this.remoteStatus.textContent = '● Terhubung';
                        this.remoteWrapper.classList.add('active-call');
                        this.log('✅ Stream remote diterima');
                    }
                };

                this.pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        this.log(`🧊 ICE: ${event.candidate.candidate.substring(0, 40)}...`);
                        // Kirim ICE candidate ke peer
                        if (this.peerId) {
                            this.sendSignal('ice-candidate', {
                                target: this.peerId,
                                candidate: event.candidate
                            });
                        }
                    } else {
                        this.log('✅ ICE gathering selesai');
                    }
                };

                this.pc.oniceconnectionstatechange = () => {
                    const state = this.pc.iceConnectionState;
                    this.log(`🔗 ICE state: ${state}`);
                    switch (state) {
                        case 'connected':
                        case 'completed':
                            this.setStatus('📞 Terhubung', 'connected');
                            if (!this.isCallActive) {
                                this.isCallActive = true;
                                this.startTimer();
                                this.updateButtons();
                                this.log('✅ Panggilan aktif!');
                            }
                            break;
                        case 'disconnected':
                        case 'failed':
                            this.setStatus('❌ Koneksi putus', 'error');
                            this.log('❌ Koneksi ICE gagal');
                            if (this.isCallActive) this.endCall();
                            break;
                        case 'checking':
                            this.setStatus('🔄 Menghubungkan...', 'connecting');
                            break;
                    }
                };

                return this.pc;
            }

            // ---------- CALL ----------
            async startCall() {
                if (this.isCallActive) {
                    this.log('⚠️ Panggilan sudah aktif');
                    return;
                }

                if (!this.ws || this.ws.readyState !== WebSocket.OPEN) {
                    this.log('⚠️ Koneksi WebSocket tidak tersedia. Pastikan sudah join room.');
                    return;
                }

                try {
                    await this.getMedia();
                    this.createPeerConnection();
                    this.isOfferer = true;

                    const offer = await this.pc.createOffer({
                        offerToReceiveVideo: true,
                        offerToReceiveAudio: true
                    });
                    await this.pc.setLocalDescription(offer);

                    // Kirim offer ke peer via WebSocket
                    if (this.peerId) {
                        this.sendSignal('offer', {
                            target: this.peerId,
                            sdp: offer.sdp
                        });
                        this.log('📤 SDP Offer dikirim ke partner');
                        this.setStatus('📤 Menunggu answer...', 'connecting');
                    } else {
                        this.log('⚠️ Tidak ada peer yang terhubung. Tunggu partner join.');
                        this.setStatus('⏳ Menunggu partner...', 'connecting');
                    }

                    this.updateButtons();

                } catch (err) {
                    this.log(`❌ Start call error: ${err.message}`);
                }
            }

            async handleOffer(sdp) {
                try {
                    await this.getMedia();
                    this.createPeerConnection();

                    await this.pc.setRemoteDescription({
                        type: 'offer',
                        sdp: sdp
                    });
                    this.log('✅ SDP Offer diterima');

                    const answer = await this.pc.createAnswer();
                    await this.pc.setLocalDescription(answer);

                    // Kirim answer ke peer
                    if (this.peerId) {
                        this.sendSignal('answer', {
                            target: this.peerId,
                            sdp: answer.sdp
                        });
                        this.log('📤 SDP Answer dikirim ke partner');
                        this.setStatus('📤 Menjawab...', 'connecting');
                    }

                    this.updateButtons();

                } catch (err) {
                    this.log(`❌ Handle offer error: ${err.message}`);
                }
            }

            async handleAnswer(sdp) {
                if (!this.pc) {
                    this.log('⚠️ Tidak ada peer connection');
                    return;
                }
                try {
                    await this.pc.setRemoteDescription({
                        type: 'answer',
                        sdp: sdp
                    });
                    this.log('✅ SDP Answer diterima');
                    this.setStatus('📞 Menghubungkan...', 'connecting');
                } catch (err) {
                    this.log(`❌ Handle answer error: ${err.message}`);
                }
            }

            async handleIceCandidate(candidate) {
                if (!this.pc) return;
                try {
                    await this.pc.addIceCandidate(candidate);
                    this.log('✅ ICE Candidate diterima');
                } catch (err) {
                    this.log(`❌ ICE candidate error: ${err.message}`);
                }
            }

            endCall() {
                this.log('⏹ Mengakhiri panggilan...');
                this.isCallActive = false;
                this.stopTimer();
                this.setStatus('📴 Panggilan selesai', 'idle');

                if (this.pc) {
                    this.pc.close();
                    this.pc = null;
                }

                this.remoteStatus.textContent = '○ Menunggu';
                this.remoteWrapper.classList.remove('active-call');
                this.localWrapper.classList.remove('active-call');

                this.stopMedia();
                this.updateButtons();
                this.log('✅ Panggilan diakhiri');
            }

            // ---------- TOGGLE ----------
            toggleCamera() {
                if (!this.localStream) return;
                const tracks = this.localStream.getVideoTracks();
                if (tracks.length === 0) return;
                this.isCameraOn = !this.isCameraOn;
                tracks.forEach(t => t.enabled = this.isCameraOn);
                this.log(`📷 Kamera ${this.isCameraOn ? 'dinyalakan' : 'dimatikan'}`);
                this.btnCamera.textContent = this.isCameraOn ? '📷 Kamera' : '📷 Mati';
                this.localStatus.textContent = this.isCameraOn ? '● Aktif' : '○ Mati';
            }

            toggleMic() {
                if (!this.localStream) return;
                const tracks = this.localStream.getAudioTracks();
                if (tracks.length === 0) return;
                this.isMicOn = !this.isMicOn;
                tracks.forEach(t => t.enabled = this.isMicOn);
                this.log(`🎤 Mikrofon ${this.isMicOn ? 'dinyalakan' : 'dimatikan'}`);
                this.btnMic.textContent = this.isMicOn ? '🎤 Mikrofon' : '🎤 Mati';
            }

            // ---------- STATUS ----------
            setStatus(text, state) {
                this.statusText.textContent = text;
                this.statusDot.className = `status-dot ${state}`;
            }

            setTimer(text) {
                this.timerDisplay.textContent = `⏱ ${text}`;
            }

            updateButtons() {
                this.btnStart.disabled = this.isCallActive;
                this.btnEnd.disabled = !this.isCallActive;
                this.btnCamera.disabled = !this.localStream;
                this.btnMic.disabled = !this.localStream;
            }

            startTimer() {
                this.callStartTime = Date.now();
                this.updateTimer();
                if (this.timerInterval) clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => this.updateTimer(), 500);
            }

            updateTimer() {
                if (!this.callStartTime) {
                    this.setTimer('00:00');
                    return;
                }
                const elapsed = Math.floor((Date.now() - this.callStartTime) / 1000);
                const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                this.setTimer(`${m}:${s}`);
            }

            stopTimer() {
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
                this.setTimer('00:00');
                this.callStartTime = null;
            }

            // ---------- LOG ----------
            log(message) {
                const time = new Date().toLocaleTimeString();
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
                this.logArea.appendChild(entry);
                this.logArea.scrollTop = this.logArea.scrollHeight;
                console.log(`[RilCall] ${message}`);
            }

            // ---------- RESET ----------
            resetAll() {
                this.log('🔄 Reset semua...');
                if (this.isCallActive) this.endCall();
                this.stopTimer();
                if (this.pc) {
                    this.pc.close();
                    this.pc = null;
                }
                this.stopMedia();
                this.isCallActive = false;
                this.peerId = null;
                this.setStatus('🔄 Reset', 'idle');
                this.setTimer('00:00');
                this.remoteStatus.textContent = '○ Menunggu';
                this.remoteWrapper.classList.remove('active-call');
                this.localWrapper.classList.remove('active-call');
                this.btnCamera.textContent = '📷 Kamera';
                this.btnMic.textContent = '🎤 Mikrofon';
                this.updateButtons();
                this.log('✅ Reset selesai');
            }
        }

        // ================================================================
        //  INISIALISASI
        // ================================================================

        const app = new RilVideoCall();

        // Ekspos ke window
        window.RilCall = app;

        console.log('%c📞 RIL VIDEO CALL - OTOMATIS!', 'font-size:18px; font-weight:bold;');
        console.log('%cCARA PAKAI:', 'font-weight:bold;');
        console.log('1. Masukkan nama room (contoh: ruang1)');
        console.log('2. Klik "Gabung Room"');
        console.log('3. Beri tahu partner untuk join room yang SAMA');
        console.log('4. Klik "Mulai Panggilan"');
        console.log('5. Koneksi video otomatis terbentuk! 🎉');
        console.log(' ');
        console.log('📌 Fitur:');
        console.log('  ✅ Otomatis - tanpa copy-paste SDP');
        console.log('  ✅ Beda jaringan / WiFi');
        console.log('  ✅ Menggunakan STUN + TURN');
        console.log('  ✅ Real-time video & audio');
        console.log('  ✅ Kontrol kamera & mikrofon');
    </script>
