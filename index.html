<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>RealCall - Video Call</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    /* ========== HALAMAN SELAMAT DATANG ========== */
    .welcome-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a0a 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease, transform 0.6s ease;
      padding: 20px;
    }

    .welcome-screen.hidden {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .welcome-content {
      text-align: center;
      max-width: 380px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .welcome-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 60px rgba(124, 58, 237, 0.4);
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .welcome-icon i { font-size: 3.2rem; color: white; }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 60px rgba(124, 58, 237, 0.4); }
      50% { box-shadow: 0 0 80px rgba(124, 58, 237, 0.6); }
    }

    .welcome-title {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .welcome-subtitle {
      color: #a78bfa;
      font-size: 1.2rem;
      font-weight: 400;
    }

    .welcome-subtitle span { color: #c4b5fd; font-weight: 600; }

    .welcome-desc {
      color: #888;
      font-size: 0.85rem;
      margin: 14px 0 28px;
      line-height: 1.6;
    }

    .btn-enter {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      color: white;
      padding: 14px 48px;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
      width: 100%;
      justify-content: center;
    }

    .btn-enter::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(135deg, #a855f7, #7c3aed, #6d28d9, #a855f7);
      background-size: 300% 300%;
      border-radius: 62px;
      z-index: -1;
      animation: borderGlow 3s ease-in-out infinite;
    }

    @keyframes borderGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .btn-enter:active { transform: scale(0.97); }

    .welcome-bg-particles {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(124, 58, 237, 0.1);
      animation: floatParticle 15s infinite linear;
    }

    .particle:nth-child(1) { width: 60px; height: 60px; top: 10%; left: 5%; animation-duration: 18s; }
    .particle:nth-child(2) { width: 100px; height: 100px; top: 60%; right: 5%; animation-duration: 22s; animation-delay: 2s; }
    .particle:nth-child(3) { width: 40px; height: 40px; bottom: 20%; left: 20%; animation-duration: 14s; animation-delay: 4s; }
    .particle:nth-child(4) { width: 80px; height: 80px; top: 30%; right: 15%; animation-duration: 20s; animation-delay: 1s; }
    .particle:nth-child(5) { width: 50px; height: 50px; bottom: 10%; right: 30%; animation-duration: 16s; animation-delay: 3s; }

    @keyframes floatParticle {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      25% { transform: translate(30px, -40px) scale(1.2); opacity: 0.6; }
      50% { transform: translate(-20px, -80px) scale(0.8); opacity: 0.4; }
      75% { transform: translate(40px, -30px) scale(1.1); opacity: 0.5; }
      100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
    }

    /* ========== APLIKASI UTAMA ========== */
    .app-container {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      position: relative;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.5s ease, transform 0.5s ease;
      max-width: 500px;
      margin: 0 auto;
    }

    .app-container.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* ===== HEADER ===== */
    .app-header {
      background: rgba(16, 16, 16, 0.98);
      backdrop-filter: blur(20px);
      padding: 12px 16px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      flex-shrink: 0;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
    }

    .app-header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-header .logo i {
      font-size: 1.4rem;
      color: #a855f7;
      background: rgba(124, 58, 237, 0.12);
      padding: 8px;
      border-radius: 12px;
    }

    .app-header .logo h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #eee;
      letter-spacing: -0.3px;
    }

    .app-header .logo h1 span {
      color: #a855f7;
    }

    .app-header .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(139, 195, 74, 0.12);
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid rgba(139, 195, 74, 0.08);
    }

    .app-header .status-badge i {
      font-size: 0.45rem;
      color: #8bc34a;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .app-header .status-badge span {
      font-size: 0.6rem;
      color: #8bc34a;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .app-header .status-badge.offline i {
      color: #555;
      animation: none;
    }

    .app-header .status-badge.offline span {
      color: #555;
    }

    /* ===== ID SECTION ===== */
    .id-section {
      background: rgba(12, 12, 12, 0.98);
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px;
    }

    .id-section .id-label {
      color: #555;
      font-size: 0.55rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .id-section .id-label i {
      color: #7c3aed;
    }

    .id-section .id-value {
      font-family: 'Courier New', monospace;
      color: #a78bfa;
      font-size: 0.6rem;
      font-weight: 500;
      background: rgba(124, 58, 237, 0.06);
      padding: 2px 12px;
      border-radius: 16px;
      border: 1px solid rgba(124, 58, 237, 0.06);
      flex: 1;
      min-width: 100px;
      text-align: center;
      word-break: break-all;
      letter-spacing: 0.3px;
    }

    .id-section .btn-copy-id {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #777;
      padding: 3px 14px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 0.5rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      font-weight: 500;
    }

    .id-section .btn-copy-id:active { transform: scale(0.95); }
    .id-section .btn-copy-id:hover { border-color: #7c3aed; color: #a78bfa; }
    .id-section .btn-copy-id.copied { border-color: #8bc34a; color: #8bc34a; }

    /* ===== MAIN VIDEO ===== */
    .main-video-container {
      flex: 1;
      position: relative;
      background: #0a0a0a;
      overflow: hidden;
      min-height: 0;
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #0a0a0a;
    }

    .remote-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #555;
      text-align: center;
      pointer-events: none;
    }

    .remote-placeholder i {
      font-size: 3.5rem;
      color: #333;
      display: block;
      margin-bottom: 10px;
    }

    .remote-placeholder span {
      font-size: 0.85rem;
      color: #666;
    }

    /* ===== CALL INFO OVERLAY ===== */
    .call-info-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.3s ease;
    }

    .call-info-overlay.hidden {
      opacity: 0;
    }

    .call-info-overlay .caller-avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2a1a4a, #1a0a2e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      border: 2px solid rgba(124, 58, 237, 0.15);
    }

    .call-info-overlay .caller-avatar i {
      font-size: 2.5rem;
      color: #7c3aed;
    }

    .call-info-overlay .caller-name {
      color: #eee;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .call-info-overlay .caller-status {
      color: #888;
      font-size: 0.75rem;
      margin-top: 4px;
    }

    .call-info-overlay .call-timer {
      color: #a78bfa;
      font-size: 1.1rem;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      margin-top: 8px;
      font-family: 'Courier New', monospace;
    }

    /* ===== LOCAL VIDEO ===== */
    .local-video-container {
      position: absolute;
      bottom: 100px;
      right: 14px;
      width: 100px;
      height: 140px;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
      z-index: 10;
      background: #1a1a1a;
      touch-action: none;
      transition: border-color 0.3s ease, transform 0.2s ease;
    }

    .local-video-container:active {
      border-color: rgba(124, 58, 237, 0.4);
    }

    .local-video-container.dragging {
      transform: scale(0.95);
      opacity: 0.8;
    }

    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #1a1a1a;
    }

    .local-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #555;
      text-align: center;
      pointer-events: none;
      font-size: 0.6rem;
    }

    .local-placeholder i {
      font-size: 1.6rem;
      color: #444;
      display: block;
      margin-bottom: 2px;
    }

    .local-label {
      position: absolute;
      bottom: 4px;
      left: 6px;
      background: rgba(0, 0, 0, 0.6);
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.45rem;
      color: #aaa;
      pointer-events: none;
      backdrop-filter: blur(4px);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ===== CONTROLS ===== */
    .call-controls {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 0 16px;
      z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
      padding-top: 30px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    }

    .ctrl-btn {
      width: 52px;
      height: 52px;
      border-radius: 52px;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.04);
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl-btn:active { transform: scale(0.88); }

    .ctrl-btn.active {
      background: rgba(124, 58, 237, 0.25);
      border-color: rgba(124, 58, 237, 0.15);
      box-shadow: 0 0 25px rgba(124, 58, 237, 0.06);
    }

    .ctrl-btn.off {
      background: rgba(200, 50, 50, 0.15);
      border-color: rgba(200, 50, 50, 0.1);
    }

    .ctrl-btn.end-call {
      background: #e74c3c;
      border-color: #e74c3c;
      width: 58px;
      box-shadow: 0 0 30px rgba(231, 76, 60, 0.15);
    }

    .ctrl-btn.end-call:active { background: #c0392b; }

    .ctrl-btn.speaker-on {
      background: rgba(124, 58, 237, 0.3);
      border-color: #7c3aed;
      box-shadow: 0 0 25px rgba(124, 58, 237, 0.08);
    }

    /* ===== CONNECT PANEL ===== */
    .connect-panel {
      background: rgba(12, 12, 12, 0.98);
      backdrop-filter: blur(20px);
      padding: 10px 16px 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      flex-shrink: 0;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    }

    .connect-panel .connect-title {
      color: #555;
      font-size: 0.55rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .connect-panel .connect-title i {
      color: #7c3aed;
    }

    .connect-panel .connect-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .connect-panel .connect-row input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 10px 14px;
      border-radius: 12px;
      color: #eee;
      font-size: 0.75rem;
      outline: none;
      font-family: 'Courier New', monospace;
      transition: 0.2s;
    }

    .connect-panel .connect-row input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.08);
    }

    .connect-panel .connect-row input::placeholder {
      color: #444;
      font-size: 0.65rem;
    }

    .connect-panel .connect-row .btn-connect {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.06);
    }

    .connect-panel .connect-row .btn-connect:active { transform: scale(0.95); }
    .connect-panel .connect-row .btn-connect:disabled { opacity: 0.4; pointer-events: none; }

    .connect-panel .connect-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .connect-panel .connect-status .status-text {
      color: #555;
      font-size: 0.55rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .connect-panel .connect-status .status-text i {
      font-size: 0.35rem;
      color: #7c3aed;
    }

    .connect-panel .connect-status .status-text .connected {
      color: #8bc34a;
    }

    /* ===== TOAST ===== */
    .toast-notification {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 20, 0.96);
      backdrop-filter: blur(20px);
      color: #eee;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 0.75rem;
      border: 1px solid #2a2a2a;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 90%;
    }

    .toast-notification.show { opacity: 1; }
    .toast-notification i { color: #a855f7; }

    /* ===== RESPONSIF ===== */
    @media (max-width: 480px) {
      .app-container { max-width: 100%; }

      .local-video-container {
        width: 80px;
        height: 110px;
        bottom: 90px;
        right: 10px;
        border-radius: 12px;
      }

      .ctrl-btn {
        width: 44px;
        height: 44px;
        font-size: 1rem;
      }

      .ctrl-btn.end-call { width: 50px; }

      .call-controls {
        gap: 10px;
        bottom: 20px;
        padding-top: 20px;
      }

      .app-header { padding: 10px 14px 8px; }
      .app-header .logo h1 { font-size: 0.95rem; }
      .app-header .logo i { font-size: 1.2rem; padding: 6px; }

      .id-section { padding: 8px 12px; }
      .id-section .id-value { font-size: 0.5rem; padding: 2px 10px; }
      .id-section .btn-copy-id { font-size: 0.45rem; padding: 2px 10px; }

      .connect-panel { padding: 8px 12px 12px; }
      .connect-panel .connect-row input { font-size: 0.65rem; padding: 8px 12px; }
      .connect-panel .connect-row .btn-connect { font-size: 0.6rem; padding: 8px 14px; }

      .call-info-overlay .caller-avatar { width: 60px; height: 60px; }
      .call-info-overlay .caller-avatar i { font-size: 2rem; }
      .call-info-overlay .caller-name { font-size: 1rem; }
      .call-info-overlay .call-timer { font-size: 0.9rem; }

      .welcome-title { font-size: 1.8rem; }
      .welcome-subtitle { font-size: 1rem; }
      .welcome-icon { width: 80px; height: 80px; border-radius: 28px; }
      .welcome-icon i { font-size: 2.6rem; }
      .btn-enter { padding: 12px 36px; font-size: 1rem; }

      .remote-placeholder i { font-size: 2.8rem; }
      .remote-placeholder span { font-size: 0.75rem; }

      .toast-notification {
        bottom: 80px;
        font-size: 0.65rem;
        padding: 8px 18px;
      }
    }

    @media (max-width: 380px) {
      .local-video-container {
        width: 65px;
        height: 90px;
        bottom: 80px;
        right: 8px;
        border-radius: 10px;
      }

      .ctrl-btn {
        width: 38px;
        height: 38px;
        font-size: 0.85rem;
      }

      .ctrl-btn.end-call { width: 44px; }
      .call-controls { gap: 8px; bottom: 16px; }

      .app-header .logo h1 { font-size: 0.8rem; }
      .id-section .id-value { font-size: 0.45rem; }
    }

    @media (min-width: 600px) {
      .app-container {
        max-width: 420px;
        max-height: 800px;
        border-radius: 32px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
        margin: 20px auto;
      }

      .local-video-container {
        width: 120px;
        height: 160px;
        bottom: 110px;
        right: 16px;
      }
    }

    @supports (padding: env(safe-area-inset-top)) {
      .app-header { padding-top: calc(12px + env(safe-area-inset-top)); }
      .call-controls { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
      .connect-panel { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <!-- ========== HALAMAN SELAMAT DATANG ========== -->
  <div class="welcome-screen" id="welcomeScreen">
    <div class="welcome-bg-particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="welcome-content">
      <div class="welcome-icon"><i class="fas fa-phone-alt"></i></div>
      <h1 class="welcome-title">Selamat Datang</h1>
      <p class="welcome-subtitle"><i class="fas fa-user-astronaut"></i> <span id="userNameDisplay">Sandy</span></p>
      <p class="welcome-desc"><i class="fas fa-video"></i> Panggilan video berkualitas tinggi<br><i class="fas fa-lock"></i> Koneksi aman dengan ID unik</p>
      <button class="btn-enter" id="enterBtn"><i class="fas fa-sign-in-alt"></i> Masuk</button>
    </div>
  </div>

  <!-- ========== APLIKASI UTAMA ========== -->
  <div class="app-container" id="appContainer">
    <!-- HEADER -->
    <div class="app-header">
      <div class="logo">
        <i class="fas fa-phone-alt"></i>
        <h1>Real<span>Call</span></h1>
      </div>
      <div class="status-badge" id="statusBadge">
        <i class="fas fa-circle"></i>
        <span id="statusBadgeText">Online</span>
      </div>
    </div>

    <!-- ID SECTION -->
    <div class="id-section">
      <span class="id-label"><i class="fas fa-id-card"></i> ID SAYA</span>
      <span class="id-value" id="myIdDisplay">memuat...</span>
      <button class="btn-copy-id" id="copyIdBtn"><i class="fas fa-copy"></i> Salin</button>
    </div>

    <!-- MAIN VIDEO -->
    <div class="main-video-container" id="mainVideoContainer">
      <video id="remoteVideo" autoplay playsinline></video>
      
      <!-- Remote Placeholder -->
      <div class="remote-placeholder" id="remotePlaceholder">
        <i class="fas fa-user-friends"></i>
        <span>Menunggu mitra terhubung...</span>
      </div>

      <!-- Call Info Overlay -->
      <div class="call-info-overlay" id="callInfoOverlay">
        <div class="caller-avatar">
          <i class="fas fa-user"></i>
        </div>
        <div class="caller-name" id="callerName">Menunggu</div>
        <div class="caller-status" id="callerStatus">Tunggu panggilan masuk...</div>
        <div class="call-timer" id="callTimer">00:00</div>
      </div>

      <!-- Local Video (Picture-in-Picture) -->
      <div class="local-video-container" id="localVideoContainer">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="local-placeholder" id="localPlaceholder">
          <i class="fas fa-video"></i>
          <span>Kamera</span>
        </div>
        <span class="local-label">Anda</span>
      </div>

      <!-- Controls -->
      <div class="call-controls">
        <button class="ctrl-btn active" id="micBtn" title="Mute"><i class="fas fa-microphone"></i></button>
        <button class="ctrl-btn" id="speakerBtn" title="Speaker"><i class="fas fa-volume-up"></i></button>
        <button class="ctrl-btn active" id="videoBtn" title="Kamera"><i class="fas fa-video"></i></button>
        <button class="ctrl-btn end-call" id="endCallBtn" title="Akhiri"><i class="fas fa-phone-slash"></i></button>
      </div>
    </div>

    <!-- CONNECT PANEL -->
    <div class="connect-panel">
      <div class="connect-title"><i class="fas fa-link"></i> HUBUNGGAN KE ID TEMAN</div>
      <div class="connect-row">
        <input type="text" id="remoteIdInput" placeholder="Masukkan ID Peer tujuan" />
        <button class="btn-connect" id="connectBtn"><i class="fas fa-phone"></i> Hubungkan</button>
      </div>
      <div class="connect-status">
        <div class="status-text" id="connectionStatus">
          <i class="fas fa-circle"></i> <span>Belum terhubung</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-notification" id="toastNotification">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">ID disalin!</span>
  </div>

  <script>
    (function() {
      // ========== ELEMEN DOM ==========
      const welcomeScreen = document.getElementById('welcomeScreen');
      const appContainer = document.getElementById('appContainer');
      const enterBtn = document.getElementById('enterBtn');
      const userNameDisplay = document.getElementById('userNameDisplay');

      const localVideo = document.getElementById('localVideo');
      const remoteVideo = document.getElementById('remoteVideo');
      const localPlaceholder = document.getElementById('localPlaceholder');
      const remotePlaceholder = document.getElementById('remotePlaceholder');
      const myIdDisplay = document.getElementById('myIdDisplay');
      const remoteIdInput = document.getElementById('remoteIdInput');
      const connectBtn = document.getElementById('connectBtn');
      const statusText = document.querySelector('#connectionStatus span');
      const statusIcon = document.querySelector('#connectionStatus i');
      const statusBadge = document.getElementById('statusBadge');
      const statusBadgeText = document.getElementById('statusBadgeText');
      const micBtn = document.getElementById('micBtn');
      const speakerBtn = document.getElementById('speakerBtn');
      const videoBtn = document.getElementById('videoBtn');
      const endCallBtn = document.getElementById('endCallBtn');
      const copyIdBtn = document.getElementById('copyIdBtn');
      const toastNotification = document.getElementById('toastNotification');
      const toastMessage = document.getElementById('toastMessage');
      const localVideoContainer = document.getElementById('localVideoContainer');
      const callInfoOverlay = document.getElementById('callInfoOverlay');
      const callerName = document.getElementById('callerName');
      const callerStatus = document.getElementById('callerStatus');
      const callTimer = document.getElementById('callTimer');

      // ========== STATE ==========
      let localStream = null;
      let remoteStream = null;
      let peerConnection = null;
      let isConnected = false;
      let isMuted = false;
      let isVideoOff = false;
      let isSpeakerOn = false;
      let toastTimeout = null;
      let isInCall = false;
      let callStartTime = null;
      let callTimerInterval = null;

      // ========== NAMA USER ==========
      const userName = 'Sandy';
      userNameDisplay.textContent = userName;

      // ========== GENERATE ID UNIK ==========
      const myId = crypto.randomUUID ? crypto.randomUUID() : 
                   'ID-' + Math.random().toString(36).substring(2, 8).toUpperCase() + 
                   Date.now().toString(36).slice(-4).toUpperCase();
      myIdDisplay.textContent = myId;

      // ========== TOAST ==========
      function showToast(message, isSuccess = true) {
        toastMessage.textContent = message;
        toastNotification.className = 'toast-notification show';
        toastNotification.querySelector('i').style.color = isSuccess ? '#a855f7' : '#ff6b6b';
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toastNotification.classList.remove('show'), 2500);
      }

      // ========== UPDATE STATUS ==========
      function setStatus(text, isConnectedStatus = false) {
        statusText.textContent = text;
        statusIcon.className = isConnectedStatus ? 'fas fa-circle connected' : 'fas fa-circle';
        if (isConnectedStatus) {
          statusBadge.className = 'status-badge';
          statusBadgeText.textContent = 'Online';
          statusBadge.querySelector('i').style.color = '#8bc34a';
          statusBadgeText.style.color = '#8bc34a';
        } else {
          statusBadge.className = 'status-badge offline';
          statusBadgeText.textContent = 'Offline';
          statusBadge.querySelector('i').style.color = '#555';
          statusBadgeText.style.color = '#555';
        }
      }

      function updateCallInfo(name, status, show = true) {
        if (show) {
          callInfoOverlay.classList.remove('hidden');
          callerName.textContent = name || 'Mitra';
          callerStatus.textContent = status || 'Menghubungi...';
        } else {
          callInfoOverlay.classList.add('hidden');
        }
      }

      // ========== CALL TIMER ==========
      function startCallTimer() {
        callStartTime = Date.now();
        if (callTimerInterval) clearInterval(callTimerInterval);
        callTimerInterval = setInterval(() => {
          const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
          const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
          const secs = String(elapsed % 60).padStart(2, '0');
          callTimer.textContent = `${mins}:${secs}`;
        }, 1000);
      }

      function stopCallTimer() {
        if (callTimerInterval) {
          clearInterval(callTimerInterval);
          callTimerInterval = null;
        }
        callTimer.textContent = '00:00';
        callStartTime = null;
      }

      // ========== COPY ID ==========
      function copyMyId() {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(myId).then(() => {
            showToast('✅ ID disalin!');
            copyIdBtn.classList.add('copied');
            copyIdBtn.innerHTML = '<i class="fas fa-check"></i> Tersalin';
            setTimeout(() => {
              copyIdBtn.classList.remove('copied');
              copyIdBtn.innerHTML = '<i class="fas fa-copy"></i> Salin';
            }, 2500);
          }).catch(() => fallbackCopy(myId));
        } else {
          fallbackCopy(myId);
        }
      }

      function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          showToast('✅ ID disalin!');
          copyIdBtn.classList.add('copied');
          copyIdBtn.innerHTML = '<i class="fas fa-check"></i> Tersalin';
          setTimeout(() => {
            copyIdBtn.classList.remove('copied');
            copyIdBtn.innerHTML = '<i class="fas fa-copy"></i> Salin';
          }, 2500);
        } catch (err) {
          showToast('❌ Gagal menyalin', false);
        }
        document.body.removeChild(textarea);
      }

      copyIdBtn.addEventListener('click', copyMyId);

      // ========== TOMBOL MASUK ==========
      enterBtn.addEventListener('click', () => {
        welcomeScreen.classList.add('hidden');
        appContainer.classList.add('visible');
        setTimeout(() => {
          if (!localStream) initCall();
        }, 500);
      });

      // ========== KONFIGURASI STUN ==========
      const rtcConfig = {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun2.l.google.com:19302' }
        ]
      };

      // ========== AMBIL MEDIA LOKAL ==========
      async function getLocalMedia() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: { width: { ideal: 320 }, height: { ideal: 240 }, facingMode: 'user' }
          });
          localStream = stream;
          localVideo.srcObject = stream;
          localPlaceholder.style.display = 'none';
          micBtn.classList.add('active');
          videoBtn.classList.add('active');
          console.log('✅ Kamera & mikrofon aktif');
          return stream;
        } catch (err) {
          console.error('❌ Gagal akses media:', err);
          localPlaceholder.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#ff6b6b;"></i>';
          showToast('❌ Izin kamera/mikrofon diperlukan!', false);
          throw err;
        }
      }

      // ========== BUAT PEER CONNECTION ==========
      function createPeerConnection() {
        if (peerConnection) {
          peerConnection.close();
          peerConnection = null;
        }
        const pc = new RTCPeerConnection(rtcConfig);

        if (localStream) {
          localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        pc.ontrack = (event) => {
          if (!remoteStream) {
            remoteStream = new MediaStream();
            remoteVideo.srcObject = remoteStream;
            remotePlaceholder.style.display = 'none';
          }
          event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
        };

        pc.onicecandidate = (e) => {
          if (e.candidate) console.log('ICE candidate:', e.candidate);
        };

        pc.onconnectionstatechange = () => {
          console.log('Connection state:', pc.connectionState);
          if (pc.connectionState === 'connected') {
            isConnected = true;
            isInCall = true;
            setStatus('✅ Terhubung', true);
            remotePlaceholder.style.display = 'none';
            updateCallInfo('Mitra', '📞 Sedang bicara', true);
            startCallTimer();
            showToast('✅ Panggilan terhubung!');
            connectBtn.disabled = false;
          } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
            isConnected = false;
            isInCall = false;
            setStatus('❌ Koneksi terputus', false);
            connectBtn.disabled = false;
            remotePlaceholder.style.display = 'flex';
            updateCallInfo('', '', false);
            stopCallTimer();
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
          }
        };

        pc.oniceconnectionstatechange = () => {
          console.log('ICE state:', pc.iceConnectionState);
          if (pc.iceConnectionState === 'checking') {
            updateCallInfo('Mitra', '⏳ Menghubungkan...', true);
          }
        };

        peerConnection = pc;
        return pc;
      }

      // ========== INISIALISASI ==========
      async function initCall() {
        try {
          await getLocalMedia();
          createPeerConnection();
          setStatus('📱 Siap memanggil', false);
          connectBtn.disabled = false;
          console.log('✅ Aplikasi siap, ID:', myId);
        } catch (e) {
          setStatus('❌ Gagal akses media', false);
        }
      }

      // ========== BUAT OFFER ==========
      async function makeOffer() {
        if (!peerConnection) createPeerConnection();
        if (!localStream) {
          await getLocalMedia();
          localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        }
        try {
          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);
          return peerConnection.localDescription;
        } catch (e) {
          console.error('❌ Gagal buat offer:', e);
          return null;
        }
      }

      // ========== HANDLE OFFER ==========
      async function handleOffer(offerSdp) {
        if (!peerConnection) createPeerConnection();
        if (!localStream) {
          await getLocalMedia();
          localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        }
        try {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(offerSdp));
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);
          return peerConnection.localDescription;
        } catch (e) {
          console.error('❌ Gagal handle offer:', e);
          return null;
        }
      }

      // ========== HANDLE ANSWER ==========
      async function handleAnswer(answerSdp) {
        if (!peerConnection) {
          setStatus('❌ Tidak ada koneksi', false);
          return false;
        }
        try {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(answerSdp));
          setStatus('✅ Terhubung', true);
          return true;
        } catch (e) {
          console.error('❌ Gagal set answer:', e);
          return false;
        }
      }

      // ========== TOMBOL HUBUNG (SEDERHANA - LANGSUNG CONNECT) ==========
      connectBtn.addEventListener('click', async () => {
        if (isConnected || isInCall) {
          showToast('⚠️ Sudah dalam panggilan', false);
          return;
        }

        if (!localStream) {
          try { await getLocalMedia(); } catch (e) { return; }
        }

        const targetId = remoteIdInput.value.trim();
        if (!targetId) {
          showToast('❌ Masukkan ID mitra terlebih dahulu', false);
          return;
        }

        // Buat offer
        const offer = await makeOffer();
        if (!offer) return;

        const offerSdp = JSON.stringify(offer);
        
        // Tampilkan offer ke user untuk dikirim ke mitra
        // Dan minta user memasukkan answer dari mitra
        const answerSdpString = prompt(
          `📤 KIRIM OFFER KE MITRA\n\n` +
          `ID Mitra: ${targetId}\n` +
          `ID Anda: ${myId}\n\n` +
          `Salin teks di bawah dan kirim ke mitra.\n` +
          `Lalu tempelkan jawaban (answer) dari mitra.\n\n` +
          `--- OFFER ---\n${offerSdp}\n--- END OFFER ---`
        );

        if (!answerSdpString) {
          setStatus('⏹️ Dibatalkan', false);
          return;
        }

        try {
          const answerSdp = JSON.parse(answerSdpString);
          const ok = await handleAnswer(answerSdp);
          if (ok) {
            setStatus('✅ Panggilan aktif', true);
            isConnected = true;
            isInCall = true;
            remotePlaceholder.style.display = 'none';
            updateCallInfo('Mitra', '📞 Sedang bicara', true);
            startCallTimer();
            showToast('✅ Panggilan berhasil!');
          } else {
            setStatus('❌ Gagal menyambungkan', false);
            showToast('❌ Gagal menyambungkan', false);
          }
        } catch (e) {
          alert('❌ Format answer tidak valid. Pastikan menempelkan JSON SDP yang benar.');
          setStatus('❌ Error: format SDP', false);
          showToast('❌ Format SDP tidak valid', false);
        }
      });

      // ========== FUNGSI MENERIMA PANGGILAN ==========
      window.receiveCall = async function(offerSdpString) {
        if (isConnected || isInCall) {
          showToast('⚠️ Sedang dalam panggilan', false);
          return;
        }

        if (!localStream) {
          try { await getLocalMedia(); } catch (e) { return; }
        }

        let offerSdp;
        try {
          offerSdp = JSON.parse(offerSdpString);
        } catch (e) {
          alert('❌ Format offer tidak valid.');
          return;
        }

        const answer = await handleOffer(offerSdp);
        if (!answer) return;

        const answerSdp = JSON.stringify(answer);
        alert(
          `📥 KIRIM ANSWER KE MITRA\n\n` +
          `Salin teks di bawah dan kirim ke mitra.\n\n` +
          `--- ANSWER ---\n${answerSdp}\n--- END ANSWER ---\n\n` +
          `Setelah mitra menerima, koneksi akan terbentuk.`
        );
        setStatus('⏳ Menunggu koneksi...', false);
        updateCallInfo('Mitra', '⏳ Menunggu koneksi...', true);
        showToast('⏳ Menunggu koneksi...');
      };

      // ========== KONTROL: MIC ==========
      micBtn.addEventListener('click', () => {
        if (!localStream) return;
        const track = localStream.getAudioTracks()[0];
        if (!track) return;
        isMuted = !isMuted;
        track.enabled = !isMuted;
        micBtn.classList.toggle('off', isMuted);
        micBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        micBtn.classList.toggle('active', !isMuted);
        showToast(isMuted ? '🔇 Mikrofon mati' : '🎤 Mikrofon aktif');
      });

      // ========== KONTROL: VIDEO ==========
      videoBtn.addEventListener('click', () => {
        if (!localStream) return;
        const track = localStream.getVideoTracks()[0];
        if (!track) return;
        isVideoOff = !isVideoOff;
        track.enabled = !isVideoOff;
        videoBtn.classList.toggle('off', isVideoOff);
        videoBtn.innerHTML = isVideoOff ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
        videoBtn.classList.toggle('active', !isVideoOff);
        
        if (isVideoOff) {
          localPlaceholder.style.display = 'flex';
          localPlaceholder.innerHTML = '<i class="fas fa-video-slash" style="color:#ff6b6b;"></i>';
          showToast('📷 Kamera mati');
        } else {
          localPlaceholder.style.display = 'none';
          showToast('📷 Kamera aktif');
        }
      });

      // ========== KONTROL: SPEAKER ==========
      speakerBtn.addEventListener('click', () => {
        isSpeakerOn = !isSpeakerOn;
        speakerBtn.classList.toggle('speaker-on', isSpeakerOn);
        speakerBtn.innerHTML = isSpeakerOn ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-off"></i>';
        if (remoteVideo) remoteVideo.volume = isSpeakerOn ? 1.0 : 0.4;
        showToast(isSpeakerOn ? '🔊 Speaker aktif' : '🔈 Earpiece aktif');
      });

      // ========== AKHIRI PANGGILAN ==========
      endCallBtn.addEventListener('click', () => {
        if (peerConnection) {
          peerConnection.close();
          peerConnection = null;
        }

        if (remoteStream) {
          remoteStream.getTracks().forEach(t => t.stop());
          remoteStream = null;
          remoteVideo.srcObject = null;
          remotePlaceholder.style.display = 'flex';
          remotePlaceholder.querySelector('span').textContent = 'Menunggu mitra terhubung...';
        }

        isConnected = false;
        isInCall = false;
        setStatus('📴 Panggilan diakhiri', false);
        connectBtn.disabled = false;
        updateCallInfo('', '', false);
        stopCallTimer();
        showToast('📴 Panggilan diakhiri');

        micBtn.classList.remove('off');
        micBtn.classList.add('active');
        micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        
        videoBtn.classList.remove('off');
        videoBtn.classList.add('active');
        videoBtn.innerHTML = '<i class="fas fa-video"></i>';
        
        speakerBtn.classList.remove('speaker-on');
        speakerBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        
        isMuted = false;
        isVideoOff = false;
        isSpeakerOn = false;

        if (localStream) {
          localStream.getTracks().forEach(t => t.stop());
          localStream = null;
          localVideo.srcObject = null;
          localPlaceholder.style.display = 'flex';
          localPlaceholder.innerHTML = '<i class="fas fa-video"></i><span>Kamera</span>';
        }

        setTimeout(() => initCall(), 500);
      });

      // ========== DRAG LOCAL VIDEO ==========
      let isDragging = false;
      let dragOffsetX, dragOffsetY;

      function startDrag(clientX, clientY) {
        const rect = localVideoContainer.getBoundingClientRect();
        dragOffsetX = clientX - rect.left;
        dragOffsetY = clientY - rect.top;
        isDragging = true;
        localVideoContainer.style.cursor = 'grabbing';
        localVideoContainer.style.transition = 'none';
        localVideoContainer.classList.add('dragging');
      }

      function moveDrag(clientX, clientY) {
        if (!isDragging) return;
        const containerRect = localVideoContainer.parentElement.getBoundingClientRect();
        let x = clientX - containerRect.left - dragOffsetX;
        let y = clientY - containerRect.top - dragOffsetY;
        const maxX = containerRect.width - localVideoContainer.offsetWidth - 10;
        const maxY = containerRect.height - localVideoContainer.offsetHeight - 60;
        x = Math.max(10, Math.min(maxX, x));
        y = Math.max(10, Math.min(maxY, y));
        localVideoContainer.style.left = x + 'px';
        localVideoContainer.style.right = 'auto';
        localVideoContainer.style.bottom = 'auto';
        localVideoContainer.style.top = y + 'px';
      }

      function endDrag() {
        if (isDragging) {
          isDragging = false;
          localVideoContainer.style.cursor = 'pointer';
          localVideoContainer.style.transition = '';
          localVideoContainer.classList.remove('dragging');
        }
      }

      localVideoContainer.addEventListener('mousedown', (e) => {
        if (e.target.closest('.local-label')) return;
        startDrag(e.clientX, e.clientY);
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
      document.addEventListener('mouseup', endDrag);

      localVideoContainer.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        startDrag(touch.clientX, touch.clientY);
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        moveDrag(touch.clientX, touch.clientY);
      }, { passive: false });

      document.addEventListener('touchend', endDrag);

      // ========== PANDUAN ==========
      console.log('═══════════════════════════════════');
      console.log('📱 RealCall - Video Call');
      console.log(`👤 User: ${userName}`);
      console.log(`🆔 ID UNIK ANDA: ${myId}`);
      console.log('═══════════════════════════════════');
      console.log('📤 MEMANGGIL: Masukkan ID mitra → Klik Hubungkan');
      console.log('📥 MENERIMA: Jalankan receiveCall("OFFER_SDP")');
      console.log('═══════════════════════════════════');

    })();
  </script>
</body>
</html>
