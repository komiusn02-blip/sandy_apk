<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Panggilan Video - Seperti WhatsApp</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow: hidden;
    }

    /* ========== HALAMAN SELAMAT DATANG ========== */
    .welcome-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a0a 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .welcome-screen.hidden {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .welcome-content {
      text-align: center;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .welcome-icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      box-shadow: 0 0 60px rgba(124, 58, 237, 0.4), 0 0 120px rgba(124, 58, 237, 0.15);
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .welcome-icon i { font-size: 4rem; color: white; }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 60px rgba(124, 58, 237, 0.4), 0 0 120px rgba(124, 58, 237, 0.15); }
      50% { box-shadow: 0 0 80px rgba(124, 58, 237, 0.6), 0 0 160px rgba(124, 58, 237, 0.25); }
    }

    .welcome-title {
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #8b5cf6, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .welcome-subtitle {
      color: #a78bfa;
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 6px;
    }

    .welcome-subtitle span { color: #c4b5fd; font-weight: 600; }

    .welcome-desc {
      color: #8b8b8b;
      font-size: 0.9rem;
      margin: 16px 0 32px;
      line-height: 1.6;
    }

    .btn-enter {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      color: white;
      padding: 16px 56px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
      display: inline-flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .btn-enter::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(135deg, #a855f7, #7c3aed, #6d28d9, #a855f7);
      background-size: 300% 300%;
      border-radius: 62px;
      z-index: -1;
      animation: borderGlow 3s ease-in-out infinite;
    }

    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .btn-enter:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 0 50px rgba(124, 58, 237, 0.5); }
    .btn-enter:active { transform: scale(0.97); }
    .btn-enter:hover i { transform: translateX(5px); }
    .btn-enter i { transition: transform 0.3s ease; }

    .welcome-bg-particles {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(124, 58, 237, 0.15);
      animation: floatParticle 15s infinite linear;
    }

    .particle:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 5%; animation-duration: 18s; }
    .particle:nth-child(2) { width: 120px; height: 120px; top: 60%; right: 5%; animation-duration: 22s; animation-delay: 2s; }
    .particle:nth-child(3) { width: 60px; height: 60px; bottom: 20%; left: 20%; animation-duration: 14s; animation-delay: 4s; }
    .particle:nth-child(4) { width: 100px; height: 100px; top: 30%; right: 15%; animation-duration: 20s; animation-delay: 1s; }
    .particle:nth-child(5) { width: 50px; height: 50px; bottom: 10%; right: 30%; animation-duration: 16s; animation-delay: 3s; }

    @keyframes floatParticle {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      25% { transform: translate(30px, -50px) scale(1.2); opacity: 0.6; }
      50% { transform: translate(-20px, -100px) scale(0.8); opacity: 0.4; }
      75% { transform: translate(40px, -40px) scale(1.1); opacity: 0.5; }
      100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
    }

    /* ========== APLIKASI UTAMA (Seperti WhatsApp) ========== */
    .app-container {
      width: 100%;
      max-width: 500px;
      height: 90vh;
      max-height: 800px;
      background: #111;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
      border: 1px solid #2a2a2a;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.6s ease, transform 0.6s ease;
      display: flex;
      flex-direction: column;
    }

    .app-container.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* ===== LAYAR VIDEO UTAMA (Kamera B / Mitra) ===== */
    .main-video-container {
      flex: 1;
      position: relative;
      background: #0a0a0a;
      overflow: hidden;
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #0a0a0a;
    }

    .remote-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #555;
      text-align: center;
      pointer-events: none;
    }

    .remote-placeholder i {
      font-size: 4rem;
      color: #333;
      display: block;
      margin-bottom: 12px;
    }

    .remote-placeholder span {
      font-size: 0.9rem;
      color: #666;
    }

    /* ===== KAMERA A (Anda) - Picture-in-Picture di Sudut Bawah ===== */
    .local-video-container {
      position: absolute;
      bottom: 100px;
      right: 16px;
      width: 120px;
      height: 160px;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8);
      z-index: 10;
      background: #1a1a1a;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .local-video-container:hover {
      border-color: rgba(124, 58, 237, 0.6);
      transform: scale(1.02);
    }

    .local-video-container.dragging {
      opacity: 0.8;
      transform: scale(0.95);
    }

    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #1a1a1a;
    }

    .local-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #555;
      text-align: center;
      pointer-events: none;
      font-size: 0.7rem;
    }

    .local-placeholder i {
      font-size: 1.8rem;
      color: #444;
      display: block;
      margin-bottom: 4px;
    }

    /* Label di video lokal */
    .local-label {
      position: absolute;
      bottom: 6px;
      left: 8px;
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.55rem;
      color: #aaa;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    /* ===== HEADER ===== */
    .call-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .call-header .caller-info {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      pointer-events: auto;
    }

    .call-header .caller-info i {
      color: #a855f7;
      font-size: 1.2rem;
    }

    .call-header .caller-info span {
      font-weight: 500;
      font-size: 0.9rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .call-header .call-status {
      color: #8bc34a;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.5px;
      pointer-events: auto;
    }

    /* ===== KONTROL BAWAH ===== */
    .call-controls {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 18px;
      padding: 0 20px;
      z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      padding-top: 30px;
    }

    .ctrl-btn {
      width: 56px;
      height: 56px;
      border-radius: 56px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .ctrl-btn:active { transform: scale(0.92); }

    .ctrl-btn.active {
      background: rgba(124, 58, 237, 0.4);
      border-color: rgba(124, 58, 237, 0.3);
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.15);
    }

    .ctrl-btn.off {
      background: rgba(200, 50, 50, 0.3);
      border-color: rgba(200, 50, 50, 0.2);
    }

    .ctrl-btn.end-call {
      background: #e74c3c;
      border-color: #e74c3c;
      width: 64px;
      box-shadow: 0 0 30px rgba(231, 76, 60, 0.3);
    }

    .ctrl-btn.end-call:hover { background: #c0392b; }

    .ctrl-btn.speaker-on {
      background: rgba(124, 58, 237, 0.5);
      border-color: #7c3aed;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.2);
    }

    /* ===== PANEL KONEKSI (di bawah) ===== */
    .connection-panel {
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(20px);
      padding: 14px 16px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 30;
      position: relative;
    }

    .id-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .id-row label {
      color: #888;
      font-size: 0.7rem;
      font-weight: 600;
      min-width: 50px;
    }

    .id-row input {
      flex: 1;
      background: #222;
      border: 1px solid #333;
      padding: 8px 14px;
      border-radius: 30px;
      color: #eee;
      font-size: 0.75rem;
      outline: none;
      font-family: 'Courier New', monospace;
      min-width: 80px;
    }

    .id-row input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2);
    }

    .id-row .btn-connect {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .id-row .btn-connect:hover { transform: scale(1.05); }
    .id-row .btn-connect:disabled { opacity: 0.4; pointer-events: none; }

    .status-text {
      color: #666;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-text i { font-size: 0.4rem; color: #7c3aed; }
    .status-text .connected { color: #8bc34a; }

    .my-id-display {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      color: #888;
    }

    .my-id-display .id-text {
      font-family: 'Courier New', monospace;
      color: #a78bfa;
      font-weight: 600;
    }

    .btn-copy-id {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 2px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.6rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-copy-id:hover {
      border-color: #7c3aed;
      color: #a78bfa;
    }

    .btn-copy-id.copied {
      border-color: #8bc34a;
      color: #8bc34a;
    }

    /* ===== TOAST ===== */
    .toast-notification {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(20px);
      color: #eee;
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 0.8rem;
      border: 1px solid #333;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast-notification.show { opacity: 1; }
    .toast-notification i { color: #a855f7; }

    /* ===== RESPONSIF ===== */
    @media (max-width: 480px) {
      .app-container {
        max-width: 100%;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
      }

      .local-video-container {
        width: 90px;
        height: 120px;
        bottom: 90px;
        right: 10px;
        border-radius: 12px;
      }

      .ctrl-btn {
        width: 48px;
        height: 48px;
        font-size: 1.1rem;
      }

      .ctrl-btn.end-call { width: 56px; }

      .call-controls { gap: 12px; bottom: 20px; }

      .welcome-title { font-size: 2rem; }
      .welcome-subtitle { font-size: 1.1rem; }
      .welcome-icon { width: 90px; height: 90px; border-radius: 30px; }
      .welcome-icon i { font-size: 3rem; }
      .btn-enter { padding: 14px 40px; font-size: 1rem; }

      .connection-panel { padding: 10px 12px; }
      .id-row input { font-size: 0.65rem; padding: 6px 10px; }
    }

    @media (max-width: 380px) {
      .local-video-container {
        width: 70px;
        height: 95px;
        bottom: 80px;
        right: 8px;
      }
      .ctrl-btn {
        width: 42px;
        height: 42px;
        font-size: 1rem;
      }
      .ctrl-btn.end-call { width: 48px; }
      .call-controls { gap: 8px; }
    }
  </style>
</head>
<body>
  <!-- ========== HALAMAN SELAMAT DATANG ========== -->
  <div class="welcome-screen" id="welcomeScreen">
    <div class="welcome-bg-particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="welcome-content">
      <div class="welcome-icon"><i class="fas fa-phone-alt"></i></div>
      <h1 class="welcome-title">Selamat Datang</h1>
      <p class="welcome-subtitle"><i class="fas fa-user-astronaut"></i> <span id="userNameDisplay">Sandy</span></p>
      <p class="welcome-desc"><i class="fas fa-video"></i> Panggilan video berkualitas tinggi<br><i class="fas fa-lock"></i> Koneksi aman dengan ID unik</p>
      <button class="btn-enter" id="enterBtn"><i class="fas fa-sign-in-alt"></i> Masuk</button>
    </div>
  </div>

  <!-- ========== APLIKASI UTAMA ========== -->
  <div class="app-container" id="appContainer">
    <!-- Main Video (Kamera B / Mitra) -->
    <div class="main-video-container" id="mainVideoContainer">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="remote-placeholder" id="remotePlaceholder">
        <i class="fas fa-user-friends"></i>
        <span>Menunggu mitra terhubung...</span>
      </div>

      <!-- Header Call -->
      <div class="call-header">
        <div class="caller-info">
          <i class="fas fa-phone-alt"></i>
          <span>Panggilan Video</span>
        </div>
        <div class="call-status" id="callStatus">⏳ Menghubungi...</div>
      </div>

      <!-- Local Video (Kamera A / Anda) - Picture-in-Picture -->
      <div class="local-video-container" id="localVideoContainer">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="local-placeholder" id="localPlaceholder">
          <i class="fas fa-video"></i>
          <span>Kamera</span>
        </div>
        <span class="local-label">Anda</span>
      </div>

      <!-- Controls -->
      <div class="call-controls">
        <button class="ctrl-btn active" id="micBtn" title="Mute/Unmute"><i class="fas fa-microphone"></i></button>
        <button class="ctrl-btn" id="speakerBtn" title="Speaker/Earpiece"><i class="fas fa-volume-up"></i></button>
        <button class="ctrl-btn active" id="videoBtn" title="Matikan/Nyalakan kamera"><i class="fas fa-video"></i></button>
        <button class="ctrl-btn end-call" id="endCallBtn" title="Akhiri panggilan"><i class="fas fa-phone-slash"></i></button>
      </div>
    </div>

    <!-- Connection Panel -->
    <div class="connection-panel">
      <div class="my-id-display">
        <i class="fas fa-id-card"></i>
        <span>ID Anda:</span>
        <span class="id-text" id="myIdDisplay">memuat...</span>
        <button class="btn-copy-id" id="copyIdBtn"><i class="fas fa-copy"></i> Salin</button>
      </div>
      <div class="id-row">
        <label><i class="fas fa-link"></i></label>
        <input type="text" id="remoteIdInput" placeholder="Masukkan ID mitra" />
        <button class="btn-connect" id="connectBtn"><i class="fas fa-phone"></i> Hubung</button>
      </div>
      <div class="status-text" id="connectionStatus">
        <i class="fas fa-circle"></i> <span>Belum terhubung</span>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-notification" id="toastNotification">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">ID disalin!</span>
  </div>

  <script>
    (function() {
      // ========== ELEMEN DOM ==========
      const welcomeScreen = document.getElementById('welcomeScreen');
      const appContainer = document.getElementById('appContainer');
      const enterBtn = document.getElementById('enterBtn');
      const userNameDisplay = document.getElementById('userNameDisplay');

      const localVideo = document.getElementById('localVideo');
      const remoteVideo = document.getElementById('remoteVideo');
      const localPlaceholder = document.getElementById('localPlaceholder');
      const remotePlaceholder = document.getElementById('remotePlaceholder');
      const myIdDisplay = document.getElementById('myIdDisplay');
      const remoteIdInput = document.getElementById('remoteIdInput');
      const connectBtn = document.getElementById('connectBtn');
      const statusText = document.querySelector('#connectionStatus span');
      const statusIcon = document.querySelector('#connectionStatus i');
      const callStatus = document.getElementById('callStatus');
      const micBtn = document.getElementById('micBtn');
      const speakerBtn = document.getElementById('speakerBtn');
      const videoBtn = document.getElementById('videoBtn');
      const endCallBtn = document.getElementById('endCallBtn');
      const copyIdBtn = document.getElementById('copyIdBtn');
      const toastNotification = document.getElementById('toastNotification');
      const toastMessage = document.getElementById('toastMessage');
      const localVideoContainer = document.getElementById('localVideoContainer');

      // ========== STATE ==========
      let localStream = null;
      let remoteStream = null;
      let peerConnection = null;
      let isConnected = false;
      let isMuted = false;
      let isVideoOff = false;
      let isSpeakerOn = false;
      let toastTimeout = null;
      let isInCall = false;

      // ========== NAMA USER ==========
      const userName = 'Sandy';
      userNameDisplay.textContent = userName;

      // ========== GENERATE ID UNIK ==========
      const myId = 'ID-' + Math.random().toString(36).substring(2, 8).toUpperCase() + 
                   Date.now().toString(36).slice(-4).toUpperCase();
      myIdDisplay.textContent = myId;

      // ========== TOAST ==========
      function showToast(message, isSuccess = true) {
        toastMessage.textContent = message;
        toastNotification.className = 'toast-notification show';
        toastNotification.querySelector('i').style.color = isSuccess ? '#a855f7' : '#ff6b6b';
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toastNotification.classList.remove('show'), 2500);
      }

      // ========== COPY ID ==========
      function copyMyId() {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(myId).then(() => {
            showToast('✅ ID disalin!');
            copyIdBtn.classList.add('copied');
            copyIdBtn.innerHTML = '<i class="fas fa-check"></i> Tersalin';
            setTimeout(() => {
              copyIdBtn.classList.remove('copied');
              copyIdBtn.innerHTML = '<i class="fas fa-copy"></i> Salin';
            }, 2500);
          }).catch(() => fallbackCopy(myId));
        } else {
          fallbackCopy(myId);
        }
      }

      function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          showToast('✅ ID disalin!');
          copyIdBtn.classList.add('copied');
          copyIdBtn.innerHTML = '<i class="fas fa-check"></i> Tersalin';
          setTimeout(() => {
            copyIdBtn.classList.remove('copied');
            copyIdBtn.innerHTML = '<i class="fas fa-copy"></i> Salin';
          }, 2500);
        } catch (err) {
          showToast('❌ Gagal menyalin', false);
        }
        document.body.removeChild(textarea);
      }

      copyIdBtn.addEventListener('click', copyMyId);

      // ========== TOMBOL MASUK ==========
      enterBtn.addEventListener('click', () => {
        welcomeScreen.classList.add('hidden');
        appContainer.classList.add('visible');
        setTimeout(() => {
          if (!localStream) initCall();
        }, 400);
      });

      // ========== KONFIGURASI STUN ==========
      const rtcConfig = {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun2.l.google.com:19302' }
        ]
      };

      // ========== UPDATE STATUS ==========
      function setStatus(text, isConnectedStatus = false) {
        statusText.textContent = text;
        statusIcon.className = isConnectedStatus ? 'fas fa-circle connected' : 'fas fa-circle';
      }

      function setCallStatus(text) {
        callStatus.textContent = text;
      }

      // ========== AMBIL MEDIA LOKAL ==========
      async function getLocalMedia() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: { width: { ideal: 320 }, height: { ideal: 240 }, facingMode: 'user' }
          });
          localStream = stream;
          localVideo.srcObject = stream;
          localPlaceholder.style.display = 'none';
          micBtn.classList.add('active');
          videoBtn.classList.add('active');
          console.log('✅ Kamera & mikrofon aktif');
          return stream;
        } catch (err) {
          console.error('❌ Gagal akses media:', err);
          localPlaceholder.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#ff6b6b;"></i>';
          showToast('❌ Izin kamera/mikrofon diperlukan!', false);
          throw err;
        }
      }

      // ========== BUAT PEER CONNECTION ==========
      function createPeerConnection() {
        if (peerConnection) {
          peerConnection.close();
          peerConnection = null;
        }
        const pc = new RTCPeerConnection(rtcConfig);

        if (localStream) {
          localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        pc.ontrack = (event) => {
          if (!remoteStream) {
            remoteStream = new MediaStream();
            remoteVideo.srcObject = remoteStream;
            remotePlaceholder.style.display = 'none';
          }
          event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
        };

        pc.onicecandidate = (e) => {
          if (e.candidate) console.log('ICE candidate:', e.candidate);
        };

        pc.onconnectionstatechange = () => {
          console.log('Connection state:', pc.connectionState);
          if (pc.connectionState === 'connected') {
            isConnected = true;
            isInCall = true;
            setStatus('✅ Terhubung', true);
            setCallStatus('📞 Sedang bicara');
            remotePlaceholder.style.display = 'none';
            showToast('✅ Panggilan terhubung!');
            connectBtn.disabled = false;
          } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
            isConnected = false;
            isInCall = false;
            setStatus('❌ Koneksi terputus', false);
            setCallStatus('📴 Putus');
            connectBtn.disabled = false;
            remotePlaceholder.style.display = 'flex';
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
          }
        };

        pc.oniceconnectionstatechange = () => {
          console.log('ICE state:', pc.iceConnectionState);
          if (pc.iceConnectionState === 'checking') {
            setCallStatus('⏳ Menghubungkan...');
          }
        };

        peerConnection = pc;
        return pc;
      }

      // ========== INISIALISASI ==========
      async function initCall() {
        try {
          await getLocalMedia();
          createPeerConnection();
          setStatus('📱 Siap memanggil', false);
          setCallStatus('📱 Siap');
          connectBtn.disabled = false;
          console.log('✅ Aplikasi siap, ID:', myId);
        } catch (e) {
          setStatus('❌ Gagal akses media', false);
        }
      }

      // ========== BUAT OFFER ==========
      async function makeOffer() {
        if (!peerConnection) createPeerConnection();
        if (!localStream) {
          await getLocalMedia();
          localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        }
        try {
          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);
          return peerConnection.localDescription;
        } catch (e) {
          console.error('❌ Gagal buat offer:', e);
          return null;
        }
      }

      // ========== HANDLE OFFER ==========
      async function handleOffer(offerSdp) {
        if (!peerConnection) createPeerConnection();
        if (!localStream) {
          await getLocalMedia();
          localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        }
        try {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(offerSdp));
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);
          return peerConnection.localDescription;
        } catch (e) {
          console.error('❌ Gagal handle offer:', e);
          return null;
        }
      }

      // ========== HANDLE ANSWER ==========
      async function handleAnswer(answerSdp) {
        if (!peerConnection) {
          setStatus('❌ Tidak ada koneksi', false);
          return false;
        }
        try {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(answerSdp));
          setStatus('✅ Terhubung', true);
          return true;
        } catch (e) {
          console.error('❌ Gagal set answer:', e);
          return false;
        }
      }

      // ========== TOMBOL HUBUNG ==========
      connectBtn.addEventListener('click', async () => {
        if (isConnected || isInCall) {
          showToast('⚠️ Sudah dalam panggilan', false);
          return;
        }

        if (!localStream) {
          try { await getLocalMedia(); } catch (e) { return; }
        }

        const offer = await makeOffer();
        if (!offer) return;

        const offerSdp = JSON.stringify(offer);
        const targetId = remoteIdInput.value.trim() || 'mitra';

        const answerSdpString = prompt(
          `📤 KIRIM OFFER KE MITRA\n\n` +
          `ID Mitra: ${targetId}\n` +
          `ID Anda: ${myId}\n\n` +
          `Salin teks di bawah dan kirim ke mitra.\n` +
          `Lalu tempelkan jawaban (answer) dari mitra.\n\n` +
          `--- OFFER ---\n${offerSdp}\n--- END OFFER ---`
        );

        if (!answerSdpString) {
          setStatus('⏹️ Dibatalkan', false);
          return;
        }

        try {
          const answerSdp = JSON.parse(answerSdpString);
          const ok = await handleAnswer(answerSdp);
          if (ok) {
            setStatus('✅ Panggilan aktif', true);
            setCallStatus('📞 Sedang bicara');
            isConnected = true;
            isInCall = true;
            remotePlaceholder.style.display = 'none';
            showToast('✅ Panggilan berhasil!');
          } else {
            setStatus('❌ Gagal menyambungkan', false);
            showToast('❌ Gagal menyambungkan', false);
          }
        } catch (e) {
          alert('❌ Format answer tidak valid. Pastikan menempelkan JSON SDP yang benar.');
          setStatus('❌ Error: format SDP', false);
          showToast('❌ Format SDP tidak valid', false);
        }
      });

      // ========== FUNGSI MENERIMA PANGGILAN ==========
      window.receiveCall = async function(offerSdpString) {
        if (isConnected || isInCall) {
          showToast('⚠️ Sedang dalam panggilan', false);
          return;
        }

        if (!localStream) {
          try { await getLocalMedia(); } catch (e) { return; }
        }

        let offerSdp;
        try {
          offerSdp = JSON.parse(offerSdpString);
        } catch (e) {
          alert('❌ Format offer tidak valid.');
          return;
        }

        const answer = await handleOffer(offerSdp);
        if (!answer) return;

        const answerSdp = JSON.stringify(answer);
        alert(
          `📥 KIRIM ANSWER KE MITRA\n\n` +
          `Salin teks di bawah dan kirim ke mitra.\n\n` +
          `--- ANSWER ---\n${answerSdp}\n--- END ANSWER ---\n\n` +
          `Setelah mitra menerima, koneksi akan terbentuk.`
        );
        setStatus('⏳ Menunggu koneksi...', false);
        setCallStatus('⏳ Menunggu koneksi...');
        showToast('⏳ Menunggu koneksi...');
      };

      // ========== KONTROL: MIC ==========
      micBtn.addEventListener('click', () => {
        if (!localStream) return;
        const track = localStream.getAudioTracks()[0];
        if (!track) return;
        isMuted = !isMuted;
        track.enabled = !isMuted;
        micBtn.classList.toggle('off', isMuted);
        micBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        micBtn.classList.toggle('active', !isMuted);
        showToast(isMuted ? '🔇 Mikrofon mati' : '🎤 Mikrofon aktif');
      });

      // ========== KONTROL: VIDEO ==========
      videoBtn.addEventListener('click', () => {
        if (!localStream) return;
        const track = localStream.getVideoTracks()[0];
        if (!track) return;
        isVideoOff = !isVideoOff;
        track.enabled = !isVideoOff;
        videoBtn.classList.toggle('off', isVideoOff);
        videoBtn.innerHTML = isVideoOff ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
        videoBtn.classList.toggle('active', !isVideoOff);
        
        if (isVideoOff) {
          localPlaceholder.style.display = 'flex';
          localPlaceholder.innerHTML = '<i class="fas fa-video-slash" style="color:#ff6b6b;"></i>';
          showToast('📷 Kamera mati');
        } else {
          localPlaceholder.style.display = 'none';
          showToast('📷 Kamera aktif');
        }
      });

      // ========== KONTROL: SPEAKER ==========
      speakerBtn.addEventListener('click', () => {
        isSpeakerOn = !isSpeakerOn;
        speakerBtn.classList.toggle('speaker-on', isSpeakerOn);
        speakerBtn.innerHTML = isSpeakerOn ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-off"></i>';
        if (remoteVideo) remoteVideo.volume = isSpeakerOn ? 1.0 : 0.4;
        showToast(isSpeakerOn ? '🔊 Speaker aktif' : '🔈 Earpiece aktif');
      });

      // ========== AKHIRI PANGGILAN ==========
      endCallBtn.addEventListener('click', () => {
        if (peerConnection) {
          peerConnection.close();
          peerConnection = null;
        }

        if (remoteStream) {
          remoteStream.getTracks().forEach(t => t.stop());
          remoteStream = null;
          remoteVideo.srcObject = null;
          remotePlaceholder.style.display = 'flex';
          remotePlaceholder.querySelector('span').textContent = 'Menunggu mitra terhubung...';
        }

        isConnected = false;
        isInCall = false;
        setStatus('📴 Panggilan diakhiri', false);
        setCallStatus('📴 Selesai');
        connectBtn.disabled = false;
        showToast('📴 Panggilan diakhiri');

        micBtn.classList.remove('off');
        micBtn.classList.add('active');
        micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        
        videoBtn.classList.remove('off');
        videoBtn.classList.add('active');
        videoBtn.innerHTML = '<i class="fas fa-video"></i>';
        
        speakerBtn.classList.remove('speaker-on');
        speakerBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        
        isMuted = false;
        isVideoOff = false;
        isSpeakerOn = false;

        if (localStream) {
          localStream.getTracks().forEach(t => t.stop());
          localStream = null;
          localVideo.srcObject = null;
          localPlaceholder.style.display = 'flex';
          localPlaceholder.innerHTML = '<i class="fas fa-video"></i><span>Kamera</span>';
        }

        setTimeout(() => initCall(), 500);
      });

      // ========== DRAG LOCAL VIDEO (seperti WhatsApp) ==========
      let isDragging = false;
      let dragStartX, dragStartY;
      let containerStartX, containerStartY;

      localVideoContainer.addEventListener('mousedown', (e) => {
        if (e.target.closest('.local-label')) return;
        isDragging = true;
        const rect = localVideoContainer.getBoundingClientRect();
        const containerRect = localVideoContainer.parentElement.getBoundingClientRect();
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        containerStartX = rect.left - containerRect.left;
        containerStartY = rect.top - containerRect.top;
        localVideoContainer.style.cursor = 'grabbing';
        localVideoContainer.classList.add('dragging');
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const containerRect = localVideoContainer.parentElement.getBoundingClientRect();
        let x = e.clientX - containerRect.left - (localVideoContainer.offsetWidth / 2);
        let y = e.clientY - containerRect.top - (localVideoContainer.offsetHeight / 2);
        x = Math.max(10, Math.min(containerRect.width - localVideoContainer.offsetWidth - 10, x));
        y = Math.max(10, Math.min(containerRect.height - localVideoContainer.offsetHeight - 60, y));
        localVideoContainer.style.left = x + 'px';
        localVideoContainer.style.right = 'auto';
        localVideoContainer.style.bottom = 'auto';
        localVideoContainer.style.top = y + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          localVideoContainer.style.cursor = 'pointer';
          localVideoContainer.classList.remove('dragging');
        }
      });

      // Touch support
      localVideoContainer.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        const rect = localVideoContainer.getBoundingClientRect();
        const containerRect = localVideoContainer.parentElement.getBoundingClientRect();
        dragStartX = touch.clientX;
        dragStartY = touch.clientY;
        containerStartX = rect.left - containerRect.left;
        containerStartY = rect.top - containerRect.top;
        localVideoContainer.classList.add('dragging');
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchmove', (e) => {
        if (!localVideoContainer.classList.contains('dragging')) return;
        const touch = e.touches[0];
        const containerRect = localVideoContainer.parentElement.getBoundingClientRect();
        let x = touch.clientX - containerRect.left - (localVideoContainer.offsetWidth / 2);
        let y = touch.clientY - containerRect.top - (localVideoContainer.offsetHeight / 2);
        x = Math.max(10, Math.min(containerRect.width - localVideoContainer.offsetWidth - 10, x));
        y = Math.max(10, Math.min(containerRect.height - localVideoContainer.offsetHeight - 60, y));
        localVideoContainer.style.left = x + 'px';
        localVideoContainer.style.right = 'auto';
        localVideoContainer.style.bottom = 'auto';
        localVideoContainer.style.top = y + 'px';
      }, { passive: false });

      document.addEventListener('touchend', () => {
        localVideoContainer.classList.remove('dragging');
      });

      // ========== PANDUAN ==========
      console.log('═══════════════════════════════════');
      console.log('📱 APLIKASI PANGGILAN VIDEO');
      console.log(`👤 User: ${userName}`);
      console.log(`🆔 ID UNIK ANDA: ${myId}`);
      console.log('═══════════════════════════════════');
      console.log('📤 MEMANGGIL: Masukkan ID mitra → Klik Hubung');
      console.log('📥 MENERIMA: Jalankan receiveCall("OFFER_SDP")');
      console.log('═══════════════════════════════════');

    })();
  </script>
</body>
</html>
