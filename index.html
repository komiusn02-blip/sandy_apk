<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ril Video Call - Bisa Beda Jaringan!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .app-container {
            width: 100%;
            height: 100%;
            max-width: 500px;
            max-height: 900px;
            background: #0f1a2b;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
        }

        .video-main {
            flex: 1;
            position: relative;
            background: #0a0e17;
            overflow: hidden;
        }

        .video-main video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0e17;
        }

        .video-main.local video {
            transform: scaleX(-1);
        }

        .video-pip {
            position: absolute;
            bottom: 120px;
            right: 16px;
            width: 100px;
            height: 140px;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.15);
            background: #1a2a3f;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .video-pip.hidden {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        .video-pip video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-pip .pip-label {
            position: absolute;
            bottom: 4px;
            left: 8px;
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 8px;
            border-radius: 10px;
            backdrop-filter: blur(4px);
        }

        .video-status-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            text-align: center;
            pointer-events: none;
            z-index: 5;
        }

        .video-status-overlay .big-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 12px;
        }

        .video-status-overlay .status-text {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            font-size: 0.9rem;
            color: #b0d4ff;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }

        .top-bar>* {
            pointer-events: auto;
        }

        .top-bar .call-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .top-bar .call-info .caller-name {
            color: white;
            font-weight: 600;
            font-size: 1rem;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .top-bar .call-info .call-status {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.7rem;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .top-bar .call-info .call-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .top-bar .call-info .call-status .dot.active {
            background: #00e676;
            animation: pulse-dot 1.4s infinite;
        }

        .top-bar .call-info .call-status .dot.inactive {
            background: #5a6a7a;
            animation: none;
        }

        .top-bar .call-timer {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 0.5;
                transform: scale(0.9);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .bottom-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            padding: 0 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 20;
            pointer-events: none;
        }

        .bottom-controls>* {
            pointer-events: auto;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-btn:active {
            transform: scale(0.88);
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .control-btn.end-call {
            background: #dc3545;
            border-color: #dc3545;
            width: 70px;
            height: 70px;
            font-size: 1.8rem;
            box-shadow: 0 4px 30px rgba(220, 53, 69, 0.4);
        }

        .control-btn.end-call:active {
            background: #c82333;
            transform: scale(0.88);
        }

        .control-btn.end-call:disabled {
            background: #5a3a3a;
            border-color: #5a3a3a;
            box-shadow: none;
        }

        .control-btn.call-btn {
            background: #00b86b;
            border-color: #00b86b;
            width: 70px;
            height: 70px;
            font-size: 1.8rem;
            box-shadow: 0 4px 30px rgba(0, 184, 107, 0.4);
        }

        .control-btn.call-btn:active {
            background: #009a5a;
            transform: scale(0.88);
        }

        .control-btn.call-btn:disabled {
            background: #2a5a3a;
            border-color: #2a5a3a;
            box-shadow: none;
        }

        .control-btn.secondary {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .control-btn.secondary.muted {
            background: rgba(255, 50, 50, 0.3);
            border-color: rgba(255, 50, 50, 0.2);
        }

        .peer-id-box {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            text-align: center;
            max-width: 90%;
        }

        .peer-id-box.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }

        .peer-id-box .label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.6rem;
            display: block;
            margin-bottom: 2px;
        }

        .peer-id-box .id-text {
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
            word-break: break-all;
        }

        .peer-id-box .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.6rem;
            cursor: pointer;
            margin-left: 8px;
            pointer-events: auto;
            transition: all 0.2s;
        }

        .peer-id-box .copy-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.2);
        }

        .call-input-box {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 8px;
            align-items: center;
            pointer-events: none;
            max-width: 90%;
        }

        .call-input-box.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }

        .call-input-box>* {
            pointer-events: auto;
        }

        .call-input-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.8rem;
            padding: 8px 4px;
            width: 140px;
            outline: none;
        }

        .call-input-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .call-input-box .action-btn {
            background: #0077ff;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            white-space: nowrap;
        }

        .call-input-box .action-btn:active {
            transform: scale(0.92);
        }

        .call-input-box .action-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .log-mini {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.4);
            max-width: 85%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        @media (max-width: 420px) {
            .video-pip {
                width: 70px;
                height: 100px;
                bottom: 100px;
                right: 10px;
            }
            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
            }
            .control-btn.end-call,
            .control-btn.call-btn {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
            .bottom-controls {
                gap: 12px;
                bottom: 20px;
            }
            .call-input-box input {
                width: 100px;
                font-size: 0.7rem;
            }
            .peer-id-box .id-text {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 360px) {
            .video-pip {
                width: 60px;
                height: 85px;
                bottom: 90px;
                right: 8px;
            }
            .control-btn {
                width: 44px;
                height: 44px;
                font-size: 1.1rem;
            }
            .control-btn.end-call,
            .control-btn.call-btn {
                width: 52px;
                height: 52px;
                font-size: 1.3rem;
            }
            .bottom-controls {
                gap: 8px;
                bottom: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <!-- Video Main -->
        <div class="video-main local" id="videoMain">
            <video id="mainVideo" autoplay playsinline muted></video>

            <!-- Status overlay -->
            <div class="video-status-overlay" id="statusOverlay">
                <span class="big-icon" id="statusIcon">📞</span>
                <div class="status-text" id="statusOverlayText">Masukkan ID Partner</div>
            </div>

            <!-- Top Bar -->
            <div class="top-bar">
                <div class="call-info">
                    <div class="caller-name" id="callerName">Ril Video Call</div>
                    <div class="call-status" id="callStatus">
                        <span class="dot inactive" id="statusDot"></span>
                        <span id="statusLabel">Belum terhubung</span>
                    </div>
                </div>
                <div class="call-timer" id="timerDisplay">00:00</div>
            </div>

            <!-- Picture-in-Picture -->
            <div class="video-pip hidden" id="pipContainer">
                <video id="pipVideo" autoplay playsinline></video>
                <div class="pip-label">Partner</div>
            </div>

            <!-- ID Display -->
            <div class="peer-id-box" id="peerIdBox">
                <span class="label">🆔 ID Anda (kirim ke partner)</span>
                <span class="id-text" id="myIdDisplay">-</span>
                <button class="copy-btn" id="copyIdBtn">📋 Copy</button>
            </div>

            <!-- Call Input -->
            <div class="call-input-box" id="callInputBox">
                <input type="text" id="peerIdInput" placeholder="Masukkan ID partner...">
                <button class="action-btn" id="callBtn">📞 Panggil</button>
                <button class="action-btn secondary" id="resetBtn">↺ Reset</button>
            </div>

            <!-- Log -->
            <div class="log-mini" id="logMini">📱 Siap memanggil...</div>

            <!-- Bottom Controls -->
            <div class="bottom-controls">
                <button class="control-btn secondary" id="btnCamera" disabled>
                    <span class="icon">📷</span>
                </button>
                <button class="control-btn secondary" id="btnMic" disabled>
                    <span class="icon">🎤</span>
                </button>
                <button class="control-btn call-btn" id="btnEndCall" disabled>
                    <span class="icon">⏹</span>
                </button>
            </div>
        </div>
    </div>

    <!-- PeerJS Library -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js">
    </script>

    <script>
        // ================================================================
        //  RIL VIDEO CALL - BENAR-BENAR BERFUNGSI!
        //  Menggunakan PeerJS (signaling server gratis)
        //  Bisa terhubung antar jaringan dan perangkat berbeda
        // ================================================================

        class RilVideoCall {
            constructor() {
                // State
                this.localStream = null;
                this.remoteStream = null;
                this.peer = null;
                this.connection = null;
                this.call = null;
                this.isCallActive = false;
                this.isCameraOn = true;
                this.isMicOn = true;
                this.callStartTime = null;
                this.timerInterval = null;
                this.myId = '';
                this.peerId = '';

                // DOM
                this.mainVideo = document.getElementById('mainVideo');
                this.pipVideo = document.getElementById('pipVideo');
                this.pipContainer = document.getElementById('pipContainer');
                this.statusOverlay = document.getElementById('statusOverlay');
                this.statusIcon = document.getElementById('statusIcon');
                this.statusOverlayText = document.getElementById('statusOverlayText');
                this.callerName = document.getElementById('callerName');
                this.callStatus = document.getElementById('callStatus');
                this.statusDot = document.getElementById('statusDot');
                this.statusLabel = document.getElementById('statusLabel');
                this.timerDisplay = document.getElementById('timerDisplay');
                this.logMini = document.getElementById('logMini');
                this.myIdDisplay = document.getElementById('myIdDisplay');
                this.peerIdBox = document.getElementById('peerIdBox');
                this.callInputBox = document.getElementById('callInputBox');
                this.peerIdInput = document.getElementById('peerIdInput');

                // Buttons
                this.btnCall = document.getElementById('callBtn');
                this.btnEndCall = document.getElementById('btnEndCall');
                this.btnCamera = document.getElementById('btnCamera');
                this.btnMic = document.getElementById('btnMic');
                this.btnReset = document.getElementById('resetBtn');
                this.copyIdBtn = document.getElementById('copyIdBtn');

                this.init();
            }

            init() {
                this.setupEventListeners();
                this.log('📱 Memulai PeerJS...');
                this.initPeer();
            }

            setupEventListeners() {
                this.btnCall.addEventListener('click', () => this.startCall());
                this.btnEndCall.addEventListener('click', () => this.endCall());
                this.btnCamera.addEventListener('click', () => this.toggleCamera());
                this.btnMic.addEventListener('click', () => this.toggleMic());
                this.btnReset.addEventListener('click', () => this.resetAll());
                this.copyIdBtn.addEventListener('click', () => this.copyMyId());

                this.peerIdInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.startCall();
                });
            }

            // ---------- PEERJS ----------
            initPeer() {
                try {
                    // Generate random ID
                    this.myId = 'ril-' + Math.random().toString(36).substring(2, 8);

                    this.peer = new Peer(this.myId, {
                        debug: 2,
                        config: {
                            iceServers: [
                                { urls: 'stun:stun.l.google.com:19302' },
                                { urls: 'stun:stun1.l.google.com:19302' },
                                { urls: 'stun:stun2.l.google.com:19302' },
                                {
                                    urls: 'turn:openrelay.metered.ca:80',
                                    username: 'openrelayproject',
                                    credential: 'openrelayproject'
                                },
                                {
                                    urls: 'turn:openrelay.metered.ca:443',
                                    username: 'openrelayproject',
                                    credential: 'openrelayproject'
                                },
                                {
                                    urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                                    username: 'openrelayproject',
                                    credential: 'openrelayproject'
                                }
                            ]
                        }
                    });

                    this.peer.on('open', (id) => {
                        this.myId = id;
                        this.myIdDisplay.textContent = id;
                        this.peerIdBox.classList.remove('hidden');
                        this.log(`✅ Peer terhubung! ID: ${id}`);
                        this.log('📌 Kirim ID ini ke partner Anda');
                        this.setStatus('🟢 Siap', 'idle');
                        this.statusOverlayText.textContent = 'Masukkan ID Partner';
                        this.statusIcon.textContent = '📞';
                    });

                    this.peer.on('connection', (conn) => {
                        this.connection = conn;
                        this.log(`🔗 Data connection dari ${conn.peer}`);
                        this.setupDataConnection(conn);
                    });

                    this.peer.on('call', (incomingCall) => {
                        this.log(`📞 Menerima panggilan dari ${incomingCall.peer}`);
                        this.peerId = incomingCall.peer;
                        this.answerCall(incomingCall);
                    });

                    this.peer.on('error', (err) => {
                        this.log(`❌ Peer error: ${err.message}`);
                        if (err.message.includes('ID taken')) {
                            this.log('🔄 ID sudah digunakan, mencoba ID baru...');
                            this.myId = 'ril-' + Math.random().toString(36).substring(2, 8);
                            this.peer.destroy();
                            setTimeout(() => this.initPeer(), 1000);
                        }
                    });

                    this.peer.on('disconnected', () => {
                        this.log('🔴 Peer disconnected');
                        this.setStatus('🔴 Terputus', 'error');
                    });

                } catch (err) {
                    this.log(`❌ Gagal init PeerJS: ${err.message}`);
                }
            }

            setupDataConnection(conn) {
                conn.on('open', () => {
                    this.log('✅ Data connection terbuka');
                    this.peerId = conn.peer;
                    this.callInputBox.classList.add('hidden');
                });

                conn.on('data', (data) => {
                    this.log(`📨 Data diterima: ${data}`);
                });

                conn.on('close', () => {
                    this.log('🔴 Data connection ditutup');
                    if (this.isCallActive) this.endCall();
                });
            }

            // ---------- MEDIA ----------
            async getMedia() {
                try {
                    this.log('📷 Mengakses kamera & mikrofon...');
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 720 },
                            height: { ideal: 1280 },
                            facingMode: 'user'
                        },
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    });
                    this.localStream = stream;
                    this.mainVideo.srcObject = stream;
                    this.isCameraOn = true;
                    this.isMicOn = true;
                    this.btnCamera.disabled = false;
                    this.btnMic.disabled = false;
                    this.log('✅ Media siap');
                    return stream;
                } catch (err) {
                    this.log(`❌ Gagal akses media: ${err.message}`);
                    this.setStatus('❌ Media error', 'error');
                    this.statusOverlayText.textContent = 'Izin kamera ditolak';
                    this.statusIcon.textContent = '🚫';
                    throw err;
                }
            }

            stopMedia() {
                if (this.localStream) {
                    this.localStream.getTracks().forEach(t => t.stop());
                    this.localStream = null;
                    this.mainVideo.srcObject = null;
                    this.btnCamera.disabled = true;
                    this.btnMic.disabled = true;
                }
                if (this.remoteStream) {
                    this.remoteStream.getTracks().forEach(t => t.stop());
                    this.remoteStream = null;
                    this.pipVideo.srcObject = null;
                    this.pipContainer.classList.add('hidden');
                }
            }

            // ---------- CALL ----------
            async startCall() {
                if (this.isCallActive) {
                    this.log('⚠️ Panggilan sudah aktif');
                    return;
                }

                const targetId = this.peerIdInput.value.trim();
                if (!targetId) {
                    this.log('⚠️ Masukkan ID partner');
                    this.statusOverlayText.textContent = 'Masukkan ID partner!';
                    return;
                }

                if (targetId === this.myId) {
                    this.log('⚠️ Tidak bisa memanggil diri sendiri');
                    this.statusOverlayText.textContent = 'ID sendiri!';
                    return;
                }

                try {
                    this.peerId = targetId;
                    this.log(`📞 Memanggil ${targetId}...`);
                    this.setStatus('📤 Memanggil...', 'connecting');
                    this.statusOverlayText.textContent = 'Memanggil...';
                    this.statusIcon.textContent = '📤';

                    await this.getMedia();

                    // Create data connection
                    this.connection = this.peer.connect(targetId);
                    this.setupDataConnection(this.connection);

                    // Call
                    this.call = this.peer.call(targetId, this.localStream);
                    this.setupCall(this.call);

                    this.callInputBox.classList.add('hidden');
                    this.updateUI();

                } catch (err) {
                    this.log(`❌ Gagal memanggil: ${err.message}`);
                    this.setStatus('❌ Gagal', 'error');
                    this.statusOverlayText.textContent = 'Gagal memanggil';
                }
            }

            answerCall(incomingCall) {
                this.getMedia().then(() => {
                    this.call = incomingCall;
                    this.call.answer(this.localStream);
                    this.setupCall(this.call);
                    this.callInputBox.classList.add('hidden');
                    this.log('✅ Panggilan dijawab');
                    this.setStatus('📞 Menjawab...', 'connecting');
                    this.statusOverlayText.textContent = 'Menjawab...';
                    this.statusIcon.textContent = '📞';
                    this.updateUI();
                }).catch((err) => {
                    this.log(`❌ Gagal menjawab: ${err.message}`);
                });
            }

            setupCall(call) {
                call.on('stream', (remoteStream) => {
                    this.remoteStream = remoteStream;
                    this.pipVideo.srcObject = remoteStream;
                    this.pipContainer.classList.remove('hidden');
                    this.log('✅ Stream partner diterima!');

                    // Call aktif
                    this.isCallActive = true;
                    this.startTimer();
                    this.setStatus('📞 Terhubung', 'connected');
                    this.statusOverlay.style.display = 'none';
                    this.btnEndCall.disabled = false;
                    this.btnCall.disabled = true;
                    this.log('🎉 Panggilan aktif!');
                });

                call.on('close', () => {
                    this.log('🔴 Panggilan ditutup oleh partner');
                    if (this.isCallActive) this.endCall();
                });

                call.on('error', (err) => {
                    this.log(`❌ Call error: ${err.message}`);
                    if (this.isCallActive) this.endCall();
                });
            }

            endCall() {
                this.log('⏹ Mengakhiri panggilan...');
                this.isCallActive = false;
                this.stopTimer();

                if (this.call) {
                    this.call.close();
                    this.call = null;
                }

                if (this.connection) {
                    this.connection.close();
                    this.connection = null;
                }

                this.pipContainer.classList.add('hidden');
                this.stopMedia();
                this.setStatus('📴 Selesai', 'idle');
                this.statusOverlay.style.display = 'flex';
                this.statusIcon.textContent = '📞';
                this.statusOverlayText.textContent = 'Masukkan ID Partner';
                this.btnEndCall.disabled = true;
                this.btnCall.disabled = false;
                this.callInputBox.classList.remove('hidden');
                this.log('✅ Panggilan selesai');
                this.updateUI();
            }

            // ---------- TOGGLE ----------
            toggleCamera() {
                if (!this.localStream) return;
                const tracks = this.localStream.getVideoTracks();
                if (tracks.length === 0) return;
                this.isCameraOn = !this.isCameraOn;
                tracks.forEach(t => t.enabled = this.isCameraOn);
                this.btnCamera.classList.toggle('muted', !this.isCameraOn);
                this.log(`📷 ${this.isCameraOn ? 'Kamera nyala' : 'Kamera mati'}`);
            }

            toggleMic() {
                if (!this.localStream) return;
                const tracks = this.localStream.getAudioTracks();
                if (tracks.length === 0) return;
                this.isMicOn = !this.isMicOn;
                tracks.forEach(t => t.enabled = this.isMicOn);
                this.btnMic.classList.toggle('muted', !this.isMicOn);
                this.log(`🎤 ${this.isMicOn ? 'Mic nyala' : 'Mic mati'}`);
            }

            // ---------- STATUS ----------
            setStatus(text, state) {
                this.statusLabel.textContent = text;
                this.statusDot.className = `dot ${state === 'connected' ? 'active' : 'inactive'}`;
                if (state === 'connected') {
                    this.statusDot.classList.add('active');
                    this.statusDot.classList.remove('inactive');
                } else {
                    this.statusDot.classList.remove('active');
                    this.statusDot.classList.add('inactive');
                }
            }

            setTimer(text) {
                this.timerDisplay.textContent = text;
            }

            updateUI() {
                this.btnCall.disabled = this.isCallActive;
                this.btnEndCall.disabled = !this.isCallActive;
            }

            startTimer() {
                this.callStartTime = Date.now();
                this.updateTimer();
                if (this.timerInterval) clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => this.updateTimer(), 500);
            }

            updateTimer() {
                if (!this.callStartTime) {
                    this.setTimer('00:00');
                    return;
                }
                const elapsed = Math.floor((Date.now() - this.callStartTime) / 1000);
                const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                this.setTimer(`${m}:${s}`);
            }

            stopTimer() {
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
                this.setTimer('00:00');
                this.callStartTime = null;
            }

            // ---------- COPY ID ----------
            copyMyId() {
                if (!this.myId) return;
                navigator.clipboard.writeText(this.myId).then(() => {
                    this.log('📋 ID di-copy!');
                    this.copyIdBtn.textContent = '✅ Copied!';
                    setTimeout(() => {
                        this.copyIdBtn.textContent = '📋 Copy';
                    }, 2000);
                }).catch(() => {
                    // Fallback
                    const text = this.myId;
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    textarea.remove();
                    this.log('📋 ID di-copy!');
                });
            }

            // ---------- LOG ----------
            log(message) {
                this.logMini.textContent = `📱 ${message}`;
                console.log(`[RilCall] ${message}`);
            }

            // ---------- RESET ----------
            resetAll() {
                this.log('🔄 Reset...');
                if (this.isCallActive) this.endCall();
                this.stopTimer();
                if (this.call) {
                    this.call.close();
                    this.call = null;
                }
                if (this.connection) {
                    this.connection.close();
                    this.connection = null;
                }
                this.stopMedia();
                this.isCallActive = false;
                this.peerId = '';
                this.setStatus('🔄 Reset', 'idle');
                this.setTimer('00:00');
                this.statusOverlay.style.display = 'flex';
                this.statusIcon.textContent = '📞';
                this.statusOverlayText.textContent = 'Masukkan ID Partner';
                this.pipContainer.classList.add('hidden');
                this.btnCamera.classList.remove('muted');
                this.btnMic.classList.remove('muted');
                this.btnEndCall.disabled = true;
                this.btnCall.disabled = false;
                this.callInputBox.classList.remove('hidden');
                this.peerIdInput.value = '';
                this.updateUI();
                this.log('✅ Reset selesai');
            }
        }

        // ================================================================
        //  INISIALISASI
        // ================================================================

        document.addEventListener('DOMContentLoaded', () => {
            const app = new RilVideoCall();
            window.RilCall = app;

            console.log('%c📞 RIL VIDEO CALL - BENAR-BENAR BERFUNGSI!', 'font-size:20px; font-weight:bold; color:#00e676;');
            console.log('%c🚀 Bisa terhubung antar jaringan & perbedaan WiFi!', 'font-size:14px;');
            console.log('');
            console.log('%c📌 CARA PAKAI:', 'font-weight:bold; font-size:14px;');
            console.log('1. Tunggu muncul ID Anda (contoh: ril-abc123)');
            console.log('2. Kirim ID Anda ke partner (via WA/telegram)');
            console.log('3. Partner masukkan ID Anda di kotak input');
            console.log('4. Klik "Panggil"');
            console.log('5. Koneksi video terbentuk! 🎉');
            console.log('');
            console.log('%c🔧 Teknologi:', 'font-weight:bold;');
            console.log('✅ PeerJS (signaling server gratis)');
            console.log('✅ WebRTC (video/audio P2P)');
            console.log('✅ STUN + TURN (untuk tembus NAT)');
            console.log('✅ Bisa beda jaringan / WiFi');
        });
    </script>
